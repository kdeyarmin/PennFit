kind = "web"
previewPath = "/resupply/"
title = "Penn Resupply Console"
version = "1.0.0"
id = "artifacts/resupply-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/resupply/" ]
localPort = 19334

[services.development]
run = "pnpm --filter @workspace/resupply-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resupply-dashboard", "run", "build" ]
publicDir = "artifacts/resupply-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19334"
BASE_PATH = "/resupply/"
