<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>PennPaps — CPAP Mask Fitting</title>
    <meta name="description" content="Find your ideal CPAP mask with PennPaps. Privacy-first on-device fitting." />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PennPaps — Privacy-First CPAP Mask Fitting" />
    <meta property="og:description" content="Find your ideal CPAP mask in 3 minutes. Your face image never leaves your device." />

    <meta name="twitter:image" content="/opengraph.jpg" />

    <!--
      Content Security Policy. The privacy promise of PennPaps is that the
      patient's face image stays on-device. We enforce that at the browser
      level by restricting where the page may load resources from and where
      it may post data:

        - Scripts/styles/images: same-origin only (+ inline for Vite's
          dev runtime and Tailwind, +blob/data for the captured image
          and MediaPipe's WASM glue).
        - WASM + AI model: same-origin only — we vendor MediaPipe locally
          (see scripts/setup-mediapipe.mjs) instead of fetching from CDNs.
        - Network calls: same-origin only — no third-party analytics,
          no remote model downloads, no telemetry.
        - Frame ancestors: 'self' so the Replit preview iframe still works
          but external sites cannot frame the app.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.clerk.accounts.dev https://*.clerk.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://img.clerk.com https://*.clerk.com; media-src 'self' blob:; connect-src 'self' blob: https://*.clerk.accounts.dev https://*.clerk.com wss://*.clerk.accounts.dev; worker-src 'self' blob:; frame-src 'self' https://*.clerk.accounts.dev https://*.clerk.com https://challenges.cloudflare.com; object-src 'none'; base-uri 'self';"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
