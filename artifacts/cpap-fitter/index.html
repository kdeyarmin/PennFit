<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Allow user-scalable zoom (no maximum-scale, no user-scalable=no) so
      low-vision patients can pinch to zoom into product photos, label
      copy, and form fields. WCAG 2.1 SC 1.4.4 (Resize text).
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      PennPaps.com — CPAP Fitter, Shop & Resupply by Penn Home Medical Supply
    </title>
    <meta
      name="description"
      content="PennPaps.com is the online CPAP storefront from Penn Home Medical Supply: get fitted for a mask in minutes, shop cushions, filters, and tubing direct, and let us handle insurance and resupply. Privacy-first, on-device fitting."
    />

    <!--
      Per-page canonical URLs are managed at runtime by the
      useDocumentTitle hook (see src/hooks/use-document-title.tsx),
      which points each route at its production-shaped URL on
      pennpaps.com. We deliberately do NOT ship a static
      <link rel="canonical"> here because a single hardcoded
      canonical would tell search engines that every SPA route is
      the same as the homepage and collapse indexation.
    -->

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="PennPaps.com — by Penn Home Medical Supply"
    />
    <meta
      property="og:description"
      content="Your CPAP, made simple. Get fitted for a mask, shop supplies, and stay on schedule with resupply — direct from Penn Home Medical Supply. Your face image never leaves your device."
    />
    <meta property="og:image" content="/opengraph.jpg" />
    <!--
      og:url is read by social bots at share time. Bots typically do
      NOT execute JS, so a static value here is the right call for an
      SPA without SSR. Pointing every share preview at the production
      homepage avoids share cards that show preview/staging hostnames.
    -->
    <meta property="og:url" content="https://pennpaps.com/" />
    <meta property="og:site_name" content="Penn Home Medical Supply" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="PennPaps.com — by Penn Home Medical Supply"
    />
    <meta
      name="twitter:description"
      content="Your CPAP, made simple. Get fitted for a mask, shop supplies, and stay on schedule with resupply — direct from Penn Home Medical Supply."
    />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!--
      Content Security Policy. The privacy promise of PennPaps is that the
      patient's face image stays on-device. We enforce that at the browser
      level by restricting where the page may load resources from and where
      it may post data:

        - Scripts/styles/images: same-origin only (+ inline for Vite's
          dev runtime and Tailwind, +blob/data for the captured image
          and MediaPipe's WASM glue).
        - Fonts: same-origin only. Inter is self-hosted under /fonts so
          the page makes zero third-party requests for typography.
        - WASM + AI model: same-origin only — we vendor MediaPipe locally
          (see scripts/setup-mediapipe.mjs) instead of fetching from CDNs.
        - Network calls: same-origin only — no third-party analytics,
          no remote model downloads, no telemetry.
        - Frame ancestors: 'self' so the Replit preview iframe still works
          but external sites cannot frame the app.

      'unsafe-inline'/'unsafe-eval' on script-src are kept for Vite's dev
      runtime and inline Tailwind styles. We allow Cloudflare Turnstile
      challenges on script-src + frame-src for bot protection on auth /
      checkout flows. youtube-nocookie.com is allowed on frame-src for the
      /learn video library (privacy-mode embeds; no cookies until play).
      Everything else is locked to 'self'.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' blob:; worker-src 'self' blob:; frame-src 'self' https://challenges.cloudflare.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self';"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#1F3A5C" />

    <!-- Preload the most-used Inter weights so the first paint upgrades from
         the system fallback to Inter quickly without an extra round-trip. -->
    <link
      rel="preload"
      href="/fonts/Inter-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Inter-SemiBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!--
      JSON-LD structured data. Tells search engines that pennpaps.com is the
      online storefront for a real local medical-equipment supplier in PA, so
      the brand can show up in Google's knowledge panels and local pack.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MedicalBusiness",
        "name": "Penn Home Medical Supply",
        "alternateName": "PennPaps",
        "url": "https://pennpaps.com",
        "logo": "https://pennpaps.com/logo.svg",
        "image": "https://pennpaps.com/opengraph.jpg",
        "description": "Online CPAP storefront from Penn Home Medical Supply. Get fitted for a mask in minutes, shop cushions, filters, tubing, and headgear, and stay on schedule with resupply.",
        "areaServed": "US",
        "medicalSpecialty": "Pulmonary",
        "priceRange": "$$",
        "paymentAccepted": "Cash, Credit Card, Insurance",
        "potentialAction": {
          "@type": "ReserveAction",
          "name": "Start virtual mask fitting",
          "target": "https://pennpaps.com/capture"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
