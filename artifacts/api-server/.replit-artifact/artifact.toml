kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]

# Apply checked-in storefront migrations against the production
# database before building (ADR 003). This mirrors what the
# resupply-api artifact already does for the resupply DB so prod
# never lags the schema. The migrator is idempotent and serialized
# via pg_advisory_lock, so it is safe to run on every deploy. The
# api-server artifact owns this step (rather than the cpap-fitter
# static build) because the api-server is the consumer most tightly
# coupled to the storefront schema. Running it in build (vs. run)
# means it executes once per deploy instead of once per autoscale
# instance. A failed migration aborts the deploy.
[services.production.build]
args = ["bash", "-c", "node lib/db/scripts/migrate.mjs && pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
# we don't run through pnpm to make startup faster in production
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
