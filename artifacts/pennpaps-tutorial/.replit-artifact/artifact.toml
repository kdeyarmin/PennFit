kind = "video"
previewPath = "/pennpaps-tutorial/"
title = "PennPaps — How To Use"
version = "1.0.0"
id = "artifacts/pennpaps-tutorial"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pennpaps-tutorial/" ]
localPort = 20466

[services.development]
run = "pnpm --filter @workspace/pennpaps-tutorial run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pennpaps-tutorial", "run", "build" ]
publicDir = "artifacts/pennpaps-tutorial/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20466"
BASE_PATH = "/pennpaps-tutorial/"
