openapi: 3.1.0
info:
  # Do not change the title — orval uses it to name generated output files.
  title: Api
  version: 0.1.0
  description: |
    CPAP Resupply Automation admin API. Powers the admin dashboard
    (queue, episode detail, conversation viewer, fulfillment). Patient
    PHI flows through this API and lives in the resupply.* schema.
servers:
  - url: /resupply-api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admin
    description: Admin identity & session
  - name: dashboard
    description: |
      Top-of-page summary counters for the admin dashboard.
      Read-only; never returns PHI.
  - name: patients
    description: |
      Patient list + detail. Decrypted first/last name for display only;
      phone and email are surfaced as booleans (`hasPhone`, `hasEmail`).
  - name: conversations
    description: |
      Conversation list + detail (decrypted message timeline). The detail
      endpoint is the only place encrypted message bodies are surfaced
      to the admin console.
  - name: episodes
    description: |
      Episode queue (overdue / by-status). Joins prescriptions for
      itemSku + cadenceDays display.
  - name: audit
    description: |
      Append-only audit log viewer. `metadata` is already sanitised on
      write by @workspace/resupply-audit (PHI-key denylist + size/depth
      caps), so the API surfaces it as-is and the dashboard renders
      only allowlisted keys.
  - name: voice
    description: |
      Outbound voice (CPAP resupply phone calls). Admins initiate calls
      via /voice/place-call; Twilio's Voice service then drives the call
      lifecycle and reports back via /voice/status-callback. The TwiML
      handshake endpoint is intentionally NOT included in this public
      spec — Twilio is its only legitimate caller and exposing it would
      tempt dashboard code to invoke it directly.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Liveness check
      description: |
        Liveness probe. Does NOT touch the database or any other
        dependency. Use /readyz for readiness gating.
      responses:
        "200":
          description: Process is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readyz:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Readiness check
      description: |
        Readiness probe. Returns 200 only when every dependency the API
        needs to serve traffic (Postgres + the pg-boss queue) is
        reachable. The deploy gate uses this to decide whether the
        service is healthy enough to receive traffic. Failure responses
        report which dependency failed without leaking connection
        details — see CheckError for the allowed failure categories.
      responses:
        "200":
          description: All dependencies reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: One or more dependencies unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
  /me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Admin identity
      description: |
        Returns the signed-in admin's the auth provider id and verified primary
        email when the caller is on the `RESUPPLY_ADMIN_EMAILS`
        allowlist. The dashboard calls this immediately after sign-in
        to decide whether to render the admin console (200), the
        "not authorized" screen (403), or the "allowlist not
        configured" screen (503 in production with the env var unset).
      responses:
        "200":
          description: Caller is a recognized admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminIdentity"
        "401":
          description: |
            No valid session, or Auth lookup failed. The body
            contains a generic error message — never the underlying
            driver text.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: |
            Signed in, but either the primary email is unverified or
            the email is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "503":
          description: |
            Admin allowlist is not configured on this server (only
            possible in production — dev falls back to allowing any
            signed-in, email-verified user).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /voice/place-call:
    post:
      operationId: placeVoiceCall
      tags: [voice]
      summary: Place an outbound resupply call
      description: |
        Admin-initiated outbound call. Looks up the patient + episode,
        opens a conversations row (channel=voice, status=open), registers
        a short-TTL pending-session entry keyed on conversationId, and
        asks Twilio to dial the patient's decrypted phone number. Twilio
        then drives the call lifecycle and reports back via
        /voice/status-callback. The patient phone number is NEVER
        returned to the dashboard; only `{ conversationId, callSid }`.

        Returns 503 when the voice subsystem is not configured (any of
        OPENAI_API_KEY / TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN /
        RESUPPLY_VOICE_PUBLIC_BASE_URL / TWILIO_PHONE_NUMBER missing).
        This is the published behaviour, not a bug — voice is feature-
        flagged on env presence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceVoiceCallRequest"
      responses:
        "201":
          description: Call placed; Twilio is dialing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceVoiceCallResponse"
        "400":
          description: Body failed zod validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceValidationError"
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "404":
          description: Patient or episode not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceError"
        "409":
          description: |
            A voice conversation is already open for this patient/episode.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceError"
        "422":
          description: |
            Patient cannot be called as requested — e.g. no phone number
            on file or episode does not belong to this patient.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceError"
        "500":
          description: Server error creating the conversations row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceError"
        "502":
          description: Twilio rejected or failed the call placement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceError"
        "503":
          description: |
            Voice subsystem is not configured on this server (env vars
            missing) or the Twilio client could not be constructed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceError"
  /sms/send-reminder:
    post:
      operationId: sendSmsReminder
      tags: [messaging]
      summary: Admin-initiated outbound SMS resupply reminder
      description: |
        Admin-initiated outbound SMS reminder. Looks up the patient
        + episode, opens a conversations row (channel=sms,
        status=open), upserts the inbound-lookup row in
        `phone_lookup`, and dispatches the message via Twilio
        Programmable Messaging.

        On success returns `{conversationId, messageSid}` — the
        patient phone number is NEVER returned to the dashboard.

        Returns 503 when SMS+Email is not configured (any of
        TWILIO_*, SENDGRID_*, or RESUPPLY_LINK_HMAC_KEY missing).
        Feature-flagged on env presence — published behaviour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendSmsReminderRequest"
      responses:
        "201":
          description: Reminder dispatched; Twilio is sending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendSmsReminderResponse"
        "400":
          description: Body failed zod validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingValidationError"
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "404":
          description: Patient or episode not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "409":
          description: Patient is not in `active` status (paused, closed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "422":
          description: |
            Patient cannot be messaged — e.g. no phone on file, or
            episode does not belong to this patient, or phone is not
            a valid E.164 number.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "502":
          description: Twilio rejected the send.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "503":
          description: |
            SMS+Email subsystem is not configured on this server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
  /email/send-reminder:
    post:
      operationId: sendEmailReminder
      tags: [messaging]
      summary: Admin-initiated outbound email resupply reminder
      description: |
        Admin-initiated outbound email reminder. Same shape as
        /sms/send-reminder: opens a conversation, signs three short-
        TTL link tokens (confirm/edit/stop), renders the templated
        email, and dispatches via SendGrid.

        On success returns `{conversationId, messageId}` — the
        patient email address is NEVER returned to the dashboard.

        Returns 503 when SMS+Email is not configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailReminderRequest"
      responses:
        "201":
          description: Reminder dispatched; SendGrid is sending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailReminderResponse"
        "400":
          description: Body failed zod validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingValidationError"
        "401":
          description: No valid session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "404":
          description: Patient or episode not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "409":
          description: Patient is not in `active` status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "422":
          description: Patient missing email, or episode mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "502":
          description: SendGrid rejected the send.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
        "503":
          description: SMS+Email subsystem is not configured on this server.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
  /email/click:
    get:
      operationId: handleEmailClick
      tags: [messaging]
      summary: Public link-click handler for signed email reminder links
      description: |
        Public endpoint hit by patients clicking the Confirm /
        Change-address / Stop links inside an outbound reminder
        email. Authenticated by HMAC-signed token (NOT a session check). The
        dashboard MUST NOT call this — it's published only so
        consumers of the spec can see it exists.

        Always returns plain HTML (text/html) so the patient sees a
        confirmation page in their browser. The action is idempotent:
        confirm-twice = one fulfillment row, stop-twice = still
        paused, edit-twice = still awaiting_admin.
      parameters:
        - in: query
          name: t
          required: true
          schema:
            type: string
          description: HMAC-signed link token. Carries `{conversationId, action, exp}`.
      responses:
        "200":
          description: Action dispatched; renders confirmation page.
          content:
            text/html:
              schema:
                type: string
        "400":
          description: |
            Token missing, malformed, expired, signature mismatch, or
            the conversation no longer exists. Renders a generic
            "link no longer valid" page (does NOT distinguish failure
            modes to the patient — leak prevention).
          content:
            text/html:
              schema:
                type: string
        "500":
          description: Action dispatch crashed; renders generic error page.
          content:
            text/html:
              schema:
                type: string
        "503":
          description: SMS+Email subsystem is not configured on this server.
          content:
            text/html:
              schema:
                type: string
  /voice/status-callback:
    post:
      operationId: voiceStatusCallback
      tags: [voice]
      summary: Twilio call lifecycle webhook (Twilio → API)
      description: |
        Webhook called BY TWILIO (never by the dashboard) on every call
        lifecycle transition: initiated, ringing, answered, completed,
        failed, busy, no-answer, canceled. Authenticated via the Twilio
        request signature, NOT by the auth provider. The dashboard MUST NOT call
        this — it's published here only so consumers of the spec can see
        it exists and understand the audit trail.

        Always returns 200 with an empty `<Response/>` so Twilio does
        not retry. Side effects:
          * On terminal statuses, marks the conversation closed.
          * On terminal statuses, writes a `voice.call.completed` audit
            row tagged `source: "status_callback"`.
        The body fields From / To (which carry PHI) are deliberately
        ignored — only CallSid + CallStatus + the conversationId query
        param are read.
      parameters:
        - in: query
          name: conversationId
          required: true
          schema:
            type: string
            format: uuid
          description: Conversation row this call lifecycle event belongs to.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TwilioStatusCallbackBody"
      responses:
        "200":
          description: |
            Always 200 — Twilio retries 5xx with backoff, so we ack even
            on internal partial failures (audit failure is logged, not
            re-thrown).
          content:
            application/xml:
              schema:
                type: string
                example: "<Response/>"
        "401":
          description: |
            Twilio signature header missing or did not match — request
            rejected before any side effect runs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "503":
          description: Voice subsystem env vars not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Top-of-page admin counters
      description: |
        Returns the small set of counts the dashboard home renders: open
        conversations, conversations parked for an admin, overdue
        episodes, fulfillments-this-week, paused patients. Read-only;
        no PHI; gated by requireAdmin.
      responses:
        "200":
          description: Counters for the admin dashboard home.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: Paginated patient list
      description: |
        Paginated list of patients. Decrypts firstName + lastName for
        display. Phone and email are surfaced as booleans only —
        `hasPhone` / `hasEmail` — so admins can tell which channels
        are reachable without leaking the values themselves.

        `search` matches against pacwareId (plaintext, indexed) AND
        against the decrypted first/last name (server-side `pgp_sym_decrypt`).
        Decrypted-name search is a Postgres-side full scan; the limit
        cap and the admin-only gate make this acceptable for the
        small steady-state admin workload.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, paused, closed]
          description: Filter by patient status.
        - in: query
          name: search
          schema:
            type: string
            maxLength: 64
          description: |
            Case-insensitive substring match against pacwareId or the
            decrypted first/last name.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated page of patients.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListPage"
        "400":
          description: Query string failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Create a new patient
      description: |
        Admin-initiated patient creation from the dashboard. Encrypts
        first/last name, DOB, phone, email, and address at the SQL
        site via pgcrypto. Returns the new patient's id; the
        dashboard navigates to /patients/{id} on success.

        409 with `error: "duplicate_pacware_id"` when the supplied
        Pacware id is already in use — pacware_id is the unique join
        key for CSV imports and may not be reused.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientRequest"
      responses:
        "201":
          description: Patient created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePatientResponse"
        "400":
          description: Body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "409":
          description: Pacware id already in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatePacwareIdError"
  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Patient detail with episodes / prescriptions / recent activity
      description: |
        Returns the full patient header (decrypted name; hasPhone /
        hasEmail booleans only) plus the patient's prescriptions, all
        episodes, the 10 most recent conversations, and the 10 most
        recent fulfillments. The conversation summaries on this
        response do NOT include message bodies — call /conversations/{id}
        for the decrypted timeline.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Patient detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientDetail"
        "404":
          description: No patient with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update admin-editable patient settings
      description: |
        Partial update of a patient's admin-editable fields:
        `insurancePayer`, `cadenceOverrideDays`, and
        `channelPreference`. Each field is independently optional;
        sending `null` explicitly clears the field, omitting it leaves
        the column unchanged. PHI columns (name, phone, email) are
        NOT writable through this endpoint.

        Supports optional optimistic-concurrency via the
        `expectedUpdatedAt` body field. When supplied, a stale write
        returns 409 `stale_patient` instead of clobbering changes
        made by another admin.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Update applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientUpdateResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "404":
          description: No patient with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "409":
          description: |
            Optimistic-concurrency precondition failed. The supplied
            `expectedUpdatedAt` did not match the live row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StalePatientError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /patients/{id}/timeline:
    get:
      operationId: getPatientTimeline
      tags: [patients]
      summary: Unified chronological event feed for a patient
      description: |
        Merges patient-creation, prescriptions, episodes, message
        metadata, and fulfillment milestones into one descending-by-
        time array. Message bodies are NOT included — call
        /conversations/{id} for the decrypted thread.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientTimeline"
        "404":
          description: No patient with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List frequency rules (active + inactive)
      description: |
        Returns every rule, ordered by (priority asc, createdAt asc) —
        the same order the eligibility engine uses. Inactive rules are
        included so admins can re-enable them without re-entering
        the criteria.
      responses:
        "200":
          description: Rules list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrequencyRuleList"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
    post:
      operationId: createRule
      tags: [rules]
      summary: Create a frequency rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrequencyRuleCreate"
      responses:
        "201":
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrequencyRule"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /rules/{id}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a frequency rule
      description: |
        Partial update. Any field omitted from the body is left alone;
        nullable fields can be cleared by sending an explicit `null`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FrequencyRuleUpdate"
      responses:
        "200":
          description: Update applied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrequencyRuleUpdateResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "404":
          description: No rule with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a frequency rule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted.
        "404":
          description: No rule with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: Paginated conversation queue
      description: |
        Paginated list of conversations across all channels. Includes the
        owning patient's decrypted firstName + lastName so the dashboard
        can render the queue without an N+1 patient lookup. Sorted by
        `lastMessageAt DESC NULLS LAST, createdAt DESC` so the freshest
        thread is first.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, awaiting_patient, awaiting_admin, closed]
        - in: query
          name: channel
          schema:
            type: string
            enum: [sms, voice, email]
        - in: query
          name: patientId
          schema:
            type: string
            format: uuid
          description: Restrict to one patient.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated page of conversations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationListPage"
        "400":
          description: Query string failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Conversation detail with decrypted messages
      description: |
        Returns conversation header + every message in chronological order
        with bodies decrypted server-side. This is the only endpoint that
        surfaces decrypted message content to the admin console.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Conversation with decrypted message timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: No conversation with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /episodes:
    get:
      operationId: listEpisodes
      tags: [episodes]
      summary: Paginated episode queue (overdue or by-status)
      description: |
        Paginated list of episodes. Joins prescriptions for itemSku +
        cadenceDays display, and patients for decrypted firstName +
        lastName. The synthetic `overdue` status is the admin's
        actionable queue — episodes still in outreach (`outreach_pending`
        or `awaiting_response`) whose dueAt is in the past. Sorted
        oldest-due-first within the overdue queue, otherwise by
        createdAt DESC.
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - overdue
              - outreach_pending
              - awaiting_response
              - confirmed
              - declined
              - expired
              - fulfilled
              - canceled
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: q
          schema:
            type: string
            maxLength: 64
          description: |
            Free-text filter that matches against the patient's
            decrypted legal name (case-insensitive substring) OR an
            exact patient id ("pat_…") OR an exact episode id
            ("ep_…"). Trimmed; blank values are ignored. The 64-char
            cap mirrors the longest plausible "first last" string
            and prevents pathological LIKE patterns.
      responses:
        "200":
          description: Paginated page of episodes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeListPage"
        "400":
          description: Query string failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /episodes/counts:
    get:
      operationId: listEpisodeCounts
      tags: [episodes]
      summary: Per-status episode counts for the dispatcher strip
      description: |
        Returns one count per status, plus the synthetic `overdue`
        bucket (outreach_pending|awaiting_response with dueAt in
        the past) and an `all` total. Powers the count chips on the
        Episodes page so dispatchers see the size of each queue
        before clicking in. Counts respect the same `q` filter as
        the list endpoint so the chips reflect the current search.
      parameters:
        - in: query
          name: q
          schema:
            type: string
            maxLength: 64
          description: |
            Same free-text filter as `/episodes`. When provided, all
            returned counts are filtered to matching rows.
      responses:
        "200":
          description: Per-status counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodeCounts"
        "400":
          description: Query string failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /episodes/bulk-send:
    post:
      operationId: bulkSendEpisodes
      tags: [episodes, messaging]
      summary: Fan-out send a reminder for many episodes at once
      description: |
        Admin bulk action: for each supplied episode id, look up the
        owning patient and dispatch a reminder on the chosen channel
        (`sms` or `email`). Each item is processed independently —
        partial failure is the EXPECTED outcome, not an error — and
        the response carries a per-id `status` so the dashboard can
        show "23 sent, 4 skipped, 3 failed" with row-level reasons.

        Capped at 50 ids per request. Returns 503 when SMS+Email is
        not configured at all (any fan-out would fail with the same
        reason). Caller-side rate-limiting is the dashboard's
        responsibility.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpisodesBulkSendRequest"
      responses:
        "200":
          description: Per-id outcome map. May contain a mix of ok+error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpisodesBulkSendResponse"
        "400":
          description: Body failed validation (empty list, >50 ids, bad uuid, …).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "503":
          description: SMS+Email subsystem is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingError"
  /audit:
    get:
      operationId: listAudit
      tags: [audit]
      summary: Paginated audit log viewer
      description: |
        Paginated audit-log viewer. Filters: action prefix, targetTable,
        date floor (`since`). Sorted by occurredAt DESC. The `metadata`
        column is the plaintext jsonb context written through
        @workspace/resupply-audit's sanitiser (PHI-key denylist + size +
        depth caps), so it is safe to surface as-is; the dashboard
        renders only an allowlisted set of keys for defence-in-depth.
      parameters:
        - in: query
          name: action
          schema:
            type: string
            maxLength: 128
          description: Substring match against `action` (e.g. "voice." or "patient.view").
        - in: query
          name: targetTable
          schema:
            type: string
            maxLength: 64
          description: Exact match against `target_table`.
        - in: query
          name: since
          schema:
            type: string
            format: date-time
          description: Lower bound on `occurred_at` (inclusive).
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated page of audit rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "400":
          description: Query string failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"

  /conversations/{id}/reply:
    post:
      operationId: replyInConversation
      tags: [conversations]
      summary: Send a reply on an existing conversation thread
      description: |
        Posts an admin-authored reply on the in-flight conversation
        (SMS or email), reusing the original channel and vendor
        thread (Twilio sender, SendGrid threading headers). Unlike
        `POST /sms/send-reminder` and `POST /email/send-reminder` —
        which spin up a NEW conversation row keyed to the next
        outreach episode — this endpoint never creates a conversation.

        Refuses with 409 when the conversation is `closed`, since
        responding on a closed thread would silently re-open it
        without going through the normal reopening audit. Refuses
        with 422 when the conversation channel is `voice`; voice
        replies are not text-message-shaped and would silently
        fall back to nothing.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationReplyRequest"
      responses:
        "201":
          description: Reply queued/sent and persisted as an outbound message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationReplyResponse"
        "400":
          description: Body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "404":
          description: No conversation with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "409":
          description: |
            Conversation is closed, or the patient has no usable
            contact for this channel (no phone for SMS / no email
            for email; voice conversations also surface here).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationReplyConflict"
        "422":
          description: Patient phone could not be parsed as E.164.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationReplyUnsupported"
        "502":
          description: SMS/email vendor rejected the send (audit row written).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationReplyVendorError"
        "503":
          description: Messaging subsystem not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagingUnavailableError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"

  /patients/{id}/notes:
    get:
      operationId: listPatientNotes
      tags: [patients]
      summary: Recent admin case-notes for a patient
      description: |
        Returns up to the 50 most-recent notes for the patient,
        decrypted server-side. Notes are append-only by design —
        there is no PATCH or DELETE endpoint, since rewriting
        history defeats their purpose as an admin-handoff log.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notes (newest first, max 50).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNotesPage"
        "404":
          description: No patient with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
    post:
      operationId: createPatientNote
      tags: [patients]
      summary: Append a case-note to the patient record
      description: |
        Appends a free-text note to the patient. Body is encrypted
        at the SQL site via pgcrypto. Audit row records the body
        length only, never the contents.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientNoteRequest"
      responses:
        "201":
          description: Note created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientNote"
        "400":
          description: Body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "404":
          description: No patient with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"

  /patients/{id}/prescriptions:
    post:
      operationId: createPrescription
      tags: [patients]
      summary: Record a new prescription for a patient
      description: |
        Creates a new prescription row, encrypting the optional
        `details` JSON (prescriber name/NPI, diagnosis, free-text
        notes) at the SQL site. The prescription starts in
        `active` status. Once recorded, clinical fields are
        immutable — the only legal mutation is a status transition
        via `PATCH /prescriptions/{rxId}`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrescriptionRequest"
      responses:
        "201":
          description: Prescription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatePrescriptionResponse"
        "400":
          description: Body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "404":
          description: No patient with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"

  /prescriptions/{rxId}:
    patch:
      operationId: updatePrescriptionStatus
      tags: [patients]
      summary: Transition a prescription's lifecycle status
      description: |
        The only mutation allowed on a prescription after creation.
        Accepts `status: active | expired | revoked` and writes
        nothing else. Clinical fields are immutable to keep the
        provenance honest — to "edit" a prescription, create a new
        one and mark the prior one expired.
      parameters:
        - in: path
          name: rxId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePrescriptionStatusRequest"
      responses:
        "200":
          description: Status updated (or no-op if unchanged).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdatePrescriptionStatusResponse"
        "400":
          description: Body failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "404":
          description: No prescription with that id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotFoundError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"

  /patients/bulk-status:
    post:
      operationId: bulkUpdatePatientStatus
      tags: [patients]
      summary: Apply a status change to up to 100 patients in one call
      description: |
        Admin-driven bulk lifecycle change. Accepts up to 100 patient
        uuids and a target status; the server runs a single
        UPDATE...RETURNING and reports which rows matched. Per-row
        `patient.update` audit entries are written alongside one
        summary `patient.bulk_status_change` row so a future auditor
        can tell bulk actions apart from individual edits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPatientStatusRequest"
      responses:
        "200":
          description: Batch processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPatientStatusResponse"
        "400":
          description: Validation error (empty / oversize batch, unknown status).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /patients/export.csv:
    get:
      operationId: exportPatientsCsv
      tags: [patients]
      summary: Download the (optionally-filtered) patient roster as CSV
      description: |
        Streams a CSV with the same column shape as
        POST /patients/import-csv: pacware_id, legal_first_name,
        legal_last_name, date_of_birth, phone_e164, email, status,
        created_at, updated_at. Supports the same `status` and
        `search` query filters as GET /patients. Capped at 5000 rows
        per call; truncation is signalled via the response header
        `X-Truncated: true`. Each call writes one
        `patient.export.csv` audit row with row count + filter
        shape (never the search string itself).
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, paused, closed]
        - in: query
          name: search
          schema:
            type: string
            maxLength: 64
      responses:
        "200":
          description: CSV body.
          headers:
            X-Truncated:
              schema:
                type: string
                enum: ["true"]
              description: |
                Present when the row count was clamped to the
                5000-row cap. Absent when the full result set fit.
          content:
            text/csv:
              schema:
                type: string
        "400":
          description: Query string failed validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
  /patients/import-csv:
    post:
      operationId: importPatientsCsv
      tags: [patients]
      summary: Bulk-create patients from a parsed Pacware-style export
      description: |
        Accepts a JSON array of up to 500 already-parsed CSV rows.
        The dashboard parses the file client-side (papaparse),
        validates per-row, and POSTs JSON. Each row is encrypted
        and inserted in its own try/catch so a single bad row
        cannot tank the batch. Duplicates on `pacware_id` are
        counted as `skippedDuplicates`, not errors. ONE audit row
        per call records structural counts only — no PHI.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPatientsCsvRequest"
      responses:
        "200":
          description: Batch processed; per-row outcomes returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPatientsCsvResponse"
        "400":
          description: Body failed validation (e.g. > 500 rows).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleValidationError"
        "401":
          description: No session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Caller is not on the admin allowlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [resupply-api]
      required:
        - status
        - service
    AdminIdentity:
      type: object
      description: |
        Minimal identity payload for an authorized admin. Contains
        ONLY the fields the dashboard needs to render — no session
        token, no auth user object, no allowlist contents.
      properties:
        userId:
          type: string
          description: Stable auth user id, used for audit log writes.
        email:
          type: string
          format: email
          description: |
            Verified primary email, lowercased. Displayed in the
            dashboard chrome and recorded in audit rows.
        role:
          type: string
          enum: [admin, agent]
          description: |
            Caller's effective role.

              - `admin` — full privileges, including destructive
                operations like deleting cadence rules.
              - `agent` — junior-admin role used by customer-service
                staff. Identical to `admin` in every read/write
                surface EXCEPT explicit DELETE operations on
                business records (e.g. `DELETE /rules/:id`), which
                return 403 for agents. The dashboard reads this
                value to hide or disable destructive UI affordances
                so agents never see a button they cannot use.

            Membership in `RESUPPLY_ADMIN_EMAILS` always wins over
            `RESUPPLY_AGENT_EMAILS` if an email appears in both
            allowlists. The dev-mode fallback (no allowlist
            configured, NODE_ENV=development) returns `admin`.
      required:
        - userId
        - email
        - role
    AuthError:
      type: object
      description: |
        Auth failure body. Carries a single human-readable `error`
        string safe for the dashboard to render verbatim. Never
        contains the underlying error message, the user id, or any
        connection details.
      properties:
        error:
          type: string
      required:
        - error
    CheckStatus:
      type: string
      enum: [ok, failed]
    CheckError:
      type: string
      description: |
        Closed set of failure categories. We never expose raw driver
        error text — only one of these labels.
      enum:
        - timeout
        - connection_refused
        - host_not_found
        - schema_not_initialized
        - database_starting_up
        - database_does_not_exist
        - unavailable
    PlaceVoiceCallRequest:
      type: object
      description: |
        Admin instruction to place an outbound resupply call.
      properties:
        patientId:
          type: string
          format: uuid
          description: Patient row to call.
        episodeId:
          type: string
          format: uuid
          description: |
            Episode the call is associated with. Must belong to
            patientId; otherwise the request is 422'd.
      required:
        - patientId
        - episodeId
      additionalProperties: false
    PlaceVoiceCallResponse:
      type: object
      description: |
        Returned on a successful call placement. Contains only opaque
        identifiers — never the patient phone number.
      properties:
        conversationId:
          type: string
          format: uuid
          description: |
            New conversations row id. The dashboard subscribes to this
            id to surface transcript turns as they're persisted.
        callSid:
          type: string
          description: Twilio CallSid for cross-referencing with Twilio logs.
      required:
        - conversationId
        - callSid
    VoiceError:
      type: object
      description: |
        Error body returned by voice endpoints. Carries a stable
        machine-readable `error` code and an optional human-readable
        `message`. NEVER carries vendor error text or PHI.
      properties:
        error:
          type: string
          description: Stable error code.
          enum:
            - voice_not_configured
            - voice_outbound_not_configured
            - patient_not_found
            - episode_not_found
            - patient_no_phone
            - episode_patient_mismatch
            - voice_conversation_already_open
            - conversation_create_failed
            - twilio_config_error
            - twilio_call_failed
        message:
          type: string
      required:
        - error
    VoiceValidationError:
      type: object
      description: |
        Returned when the request body fails zod validation.
      properties:
        error:
          type: string
          enum: [invalid_body]
        issues:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
            required: [path, message]
      required:
        - error
        - issues
    TwilioStatusCallbackBody:
      type: object
      description: |
        Subset of the Twilio Voice Status Callback form payload that the
        endpoint actually reads. Twilio sends many more fields (From,
        To, Duration, etc.); we deliberately ignore those because
        From/To carry PHI (the patient phone number).
      properties:
        CallSid:
          type: string
          description: Twilio call identifier.
        CallStatus:
          type: string
          description: |
            Twilio call status. Terminal values close the conversation
            and emit a `voice.call.completed` audit row.
          enum:
            - initiated
            - ringing
            - answered
            - in-progress
            - completed
            - busy
            - failed
            - no-answer
            - canceled
      required:
        - CallSid
        - CallStatus
    SendSmsReminderRequest:
      type: object
      description: |
        Admin instruction to send an outbound SMS reminder.
      properties:
        patientId:
          type: string
          format: uuid
          description: Patient row to message.
        episodeId:
          type: string
          format: uuid
          description: |
            Episode the reminder is associated with. Optional — if
            omitted, the most recent episode for this patient is
            used. When provided, must belong to patientId.
        body:
          type: string
          minLength: 1
          maxLength: 1600
          description: |
            Optional override for the SMS body. When omitted, the
            server renders the default reminder template using the
            patient's first name.
      required:
        - patientId
      additionalProperties: false
    SendSmsReminderResponse:
      type: object
      description: |
        Returned on a successful SMS reminder dispatch. Contains only
        opaque identifiers — never the patient phone number.
      properties:
        conversationId:
          type: string
          format: uuid
          description: New conversations row id.
        messageSid:
          type: string
          description: Twilio MessageSid for cross-referencing with Twilio logs.
      required:
        - conversationId
        - messageSid
    SendEmailReminderRequest:
      type: object
      description: |
        Admin instruction to send an outbound email reminder.
      properties:
        patientId:
          type: string
          format: uuid
          description: Patient row to message.
        episodeId:
          type: string
          format: uuid
          description: |
            Episode the reminder is associated with. Optional — if
            omitted, the most recent episode for this patient is
            used. When provided, must belong to patientId.
      required:
        - patientId
      additionalProperties: false
    SendEmailReminderResponse:
      type: object
      description: |
        Returned on a successful email reminder dispatch. Contains
        only opaque identifiers — never the patient email address.
      properties:
        conversationId:
          type: string
          format: uuid
          description: New conversations row id.
        messageId:
          type: string
          description: SendGrid X-Message-Id for cross-referencing in SendGrid.
      required:
        - conversationId
        - messageId
    MessagingError:
      type: object
      description: |
        Error body returned by SMS+Email endpoints. Carries a stable
        machine-readable `error` code and an optional human-readable
        `message`. NEVER carries vendor error text or PHI.
      properties:
        error:
          type: string
          description: Stable error code.
          enum:
            - messaging_not_configured
            - patient_not_found
            - patient_not_active
            - patient_missing_phone
            - patient_missing_email
            - patient_phone_unnormalizable
            - episode_not_found
            - episode_patient_mismatch
            - no_episode_for_patient
            - conversation_create_failed
            - twilio_config_error
            - twilio_api_error
            - sendgrid_config_error
            - sendgrid_api_error
        message:
          type: string
        twilioStatus:
          type: integer
        twilioCode:
          type: string
        sendgridStatus:
          type: integer
      required:
        - error
    MessagingValidationError:
      type: object
      description: |
        Returned when an SMS+Email request body fails zod validation.
      properties:
        error:
          type: string
          enum: [invalid_body]
        issues:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
            required: [path, message]
      required:
        - error
        - issues
    ReadinessStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          properties:
            db:
              $ref: "#/components/schemas/CheckStatus"
            queue:
              $ref: "#/components/schemas/CheckStatus"
          required: [db, queue]
        errors:
          type: object
          description: |
            Per-dependency failure category. Only present when status
            is not_ready, and only includes entries for dependencies
            whose check failed.
          properties:
            db:
              $ref: "#/components/schemas/CheckError"
            queue:
              $ref: "#/components/schemas/CheckError"
      required:
        - status
        - checks
    PaginationMeta:
      type: object
      description: |
        Envelope shared by every list endpoint. `total` is the COUNT(*)
        of the filtered set (not the returned page).
      properties:
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - total
        - limit
        - offset
    ConsoleValidationError:
      type: object
      description: Returned when a list endpoint's query string fails zod validation.
      properties:
        error:
          type: string
          enum: [invalid_query]
        issues:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              message:
                type: string
            required: [path, message]
      required:
        - error
        - issues
    NotFoundError:
      type: object
      description: Returned when a {id} path parameter does not match any row.
      properties:
        error:
          type: string
          enum: [not_found]
      required:
        - error
    DuplicatePacwareIdError:
      type: object
      description: |
        Returned by POST /patients when the supplied pacwareId is
        already in use. The dashboard renders the message inline on
        the create-patient form so the admin can correct or jump to
        the existing record.
      properties:
        error:
          type: string
          enum: [duplicate_pacware_id]
        message:
          type: string
      required:
        - error
        - message
    CreatePatientRequest:
      type: object
      description: |
        Body for POST /patients. PHI fields (name, DOB, phone, email,
        address) are pgcrypto-encrypted server-side at the SQL site —
        the API never logs them and the request body never echoes back
        in any response.
      properties:
        pacwareId:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            Pacware patient id. Plaintext, indexed, unique. The same
            id used by the legacy DME system; required so future CSV
            imports correlate cleanly.
        legalFirstName:
          type: string
          minLength: 1
          maxLength: 80
        legalLastName:
          type: string
          minLength: 1
          maxLength: 80
        dateOfBirth:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          description: ISO date in YYYY-MM-DD form (no time / timezone).
        phoneE164:
          type: string
          nullable: true
          pattern: "^\\+[1-9]\\d{7,14}$"
          description: |
            E.164 phone (e.g. `+14155551212`). Null / omitted means
            the patient has no phone on file; SMS / voice reminders
            will not be attempted.
        email:
          type: string
          format: email
          nullable: true
          maxLength: 254
        address:
          nullable: true
          type: object
          properties:
            line1: { type: string, minLength: 1, maxLength: 120 }
            line2: { type: string, maxLength: 120 }
            city: { type: string, minLength: 1, maxLength: 80 }
            state: { type: string, minLength: 1, maxLength: 40 }
            postalCode: { type: string, minLength: 1, maxLength: 20 }
            country: { type: string, minLength: 1, maxLength: 40 }
          required: [line1, city, state, postalCode, country]
        status:
          type: string
          enum: [active, paused, closed]
          description: Defaults to `active` when omitted.
        insurancePayer:
          type: string
          nullable: true
          maxLength: 120
          description: |
            Free-text payer name (e.g. "Aetna"). Used as a match
            target by frequency_rules.
        cadenceOverrideDays:
          type: integer
          nullable: true
          minimum: 1
          maximum: 365
          description: |
            Per-patient cadence override (days). Wins over rules and
            the prescription cadence when set at create time.
        channelPreference:
          type: string
          enum: [sms, email, voice]
          nullable: true
          description: Per-patient outbound channel override.
      required:
        - pacwareId
        - legalFirstName
        - legalLastName
        - dateOfBirth
    CreatePatientResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
        - id
    DashboardSummary:
      type: object
      description: |
        Top-of-page admin counters. Every value is a row count over
        the resupply.* tables, taken at request time. Numbers, not PHI.
      properties:
        activeConversations:
          type: integer
          description: |
            conversations.status IN ('open','awaiting_patient','awaiting_admin')
            across all channels.
        awaitingAdmin:
          type: integer
          description: |
            conversations.status = 'awaiting_admin' — these are the
            conversations parked for human attention.
        overdueEpisodes:
          type: integer
          description: |
            episodes where status IN ('outreach_pending','awaiting_response')
            AND due_at <= now().
        fulfillmentsThisWeek:
          type: integer
          description: |
            fulfillments.created_at >= start of the current 7-day rolling
            window (now() - interval '7 days').
        pausedPatients:
          type: integer
          description: patients.status = 'paused'.
        prescriptionAttachmentSweep:
          description: |
            Status of the most recent run of the weekly PHI attachment
            sweep job (worker: `prescriptions.attachment.sweep`,
            cron `13 3 * * 0`). Sourced from the most recent
            `resupply.audit_log` row with `action =
            'prescription.attachment.sweep'`. `null` means no sweep
            audit row exists yet (worker has never completed a run on
            this deploy) OR the latest row's metadata could not be
            parsed into the expected counter shape (degraded gracefully
            so a malformed historical row never 500s the dashboard).
            Counters are documented in
            `artifacts/resupply-worker/src/jobs/prescription-attachment-sweep.ts`.
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/PhiSweepStatus"
      required:
        - activeConversations
        - awaitingAdmin
        - overdueEpisodes
        - fulfillmentsThisWeek
        - pausedPatients
        - prescriptionAttachmentSweep
    PhiSweepStatus:
      type: object
      description: |
        One row of summary state from the weekly PHI attachment sweep.
        All counter fields mirror the worker's `SweepCounters` shape
        (snake_case in the worker / audit metadata; camelCased here to
        match the rest of this API surface).
      properties:
        lastRunAt:
          type: string
          format: date-time
          description: |
            `audit_log.occurred_at` for the most recent
            `prescription.attachment.sweep` row.
        counters:
          $ref: "#/components/schemas/PhiSweepCounters"
      required:
        - lastRunAt
        - counters
    PhiSweepCounters:
      type: object
      description: |
        Counter snapshot from one sweep run. Every field is a
        non-negative integer. Field meanings live in the source-of-
        truth doc string in
        `artifacts/resupply-worker/src/jobs/prescription-attachment-sweep.ts`
        ("Counters semantics" block).
      properties:
        objectsScanned:
          type: integer
          minimum: 0
        referencesLoaded:
          type: integer
          minimum: 0
        orphansDeleted:
          type: integer
          minimum: 0
        orphansTooYoung:
          type: integer
          minimum: 0
        orphansNoTimeCreated:
          type: integer
          minimum: 0
        deleteErrors:
          type: integer
          minimum: 0
        delete404Idempotent:
          type: integer
          minimum: 0
        recheckSaved:
          type: integer
          minimum: 0
        nonAttachmentSkipped:
          type: integer
          minimum: 0
      required:
        - objectsScanned
        - referencesLoaded
        - orphansDeleted
        - orphansTooYoung
        - orphansNoTimeCreated
        - deleteErrors
        - delete404Idempotent
        - recheckSaved
        - nonAttachmentSkipped
    PatientListItem:
      type: object
      description: |
        One row in the patient list. Decrypts firstName + lastName for
        display. NEVER includes the phone number or email — only booleans
        showing whether the patient has each on file. The lastMessage*
        triplet is sourced from the patient_latest_message projection
        (refreshed in-line on every inbound/outbound message write) so
        the list can show "last contacted" without a per-row scan of
        the messages table.
      properties:
        id:
          type: string
          format: uuid
        pacwareId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        status:
          type: string
          enum: [active, paused, closed]
        hasPhone:
          type: boolean
        hasEmail:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
          description: |
            Timestamp of the most recent inbound or outbound message
            for this patient across any conversation. NULL when the
            patient has never exchanged a message.
        lastMessageDirection:
          type: string
          enum: [inbound, outbound]
          nullable: true
          description: |
            Direction of that most recent message. NULL when there is
            no message yet.
        lastMessagePreview:
          type: string
          nullable: true
          description: |
            Decrypted, single-line preview of the most recent message
            body, truncated to 80 characters by the projection helper.
            NULL when there is no message yet. PHI: only render in
            authenticated admin contexts.
      required:
        - id
        - pacwareId
        - firstName
        - lastName
        - status
        - hasPhone
        - hasEmail
        - createdAt
        - updatedAt
    PatientListPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PatientListItem"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - items
        - total
        - limit
        - offset
    PatientPrescription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        itemSku:
          type: string
        cadenceDays:
          type: integer
        validFrom:
          type: string
          format: date
        validUntil:
          type: string
          format: date
          nullable: true
        status:
          type: string
          enum: [active, expired, revoked]
        createdAt:
          type: string
          format: date-time
        # Attachment metadata. All four fields are populated together
        # by /attachment finalize (one row update) or all null. The
        # underlying GCS object key is intentionally not exposed —
        # downloads go through the dedicated, audit-logged
        # GET /patients/:id/prescriptions/:rxId/attachment endpoint.
        attachmentFilename:
          type: string
          nullable: true
          description: Original filename supplied by the uploading admin.
        attachmentContentType:
          type: string
          nullable: true
          description: Content-type as confirmed by GCS at finalize time.
        attachmentSizeBytes:
          type: integer
          nullable: true
          description: Object size in bytes as confirmed by GCS at finalize time.
        attachmentUploadedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - itemSku
        - cadenceDays
        - validFrom
        - status
        - createdAt
    PatientEpisode:
