          type: string
          minLength: 1
          maxLength: 200
        priority:
          type: integer
          minimum: 0
          maximum: 100000
        matchItemSkuPrefix:
          type: string
          nullable: true
          maxLength: 120
        matchInsurancePayer:
          type: string
          nullable: true
          maxLength: 120
        minTenureDays:
          type: integer
          nullable: true
          minimum: 0
          maximum: 36500
        maxTenureDays:
          type: integer
          nullable: true
          minimum: 0
          maximum: 36500
        cadenceDays:
          type: integer
          minimum: 1
          maximum: 365
        defaultChannel:
          type: string
          nullable: true
          enum: [sms, email, voice]
        active:
          type: boolean
        notes:
          type: string
          nullable: true
          maxLength: 2000
      required:
        - name
        - cadenceDays
      additionalProperties: false
    FrequencyRuleUpdate:
      type: object
      description: |
        Body for PATCH /rules/{id}. Every field is optional; sending
        `null` explicitly clears a nullable field.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        priority:
          type: integer
          minimum: 0
          maximum: 100000
        matchItemSkuPrefix:
          type: string
          nullable: true
          maxLength: 120
        matchInsurancePayer:
          type: string
          nullable: true
          maxLength: 120
        minTenureDays:
          type: integer
          nullable: true
          minimum: 0
          maximum: 36500
        maxTenureDays:
          type: integer
          nullable: true
          minimum: 0
          maximum: 36500
        cadenceDays:
          type: integer
          minimum: 1
          maximum: 365
        defaultChannel:
          type: string
          nullable: true
          enum: [sms, email, voice]
        active:
          type: boolean
        notes:
          type: string
          nullable: true
          maxLength: 2000
      additionalProperties: false
    FrequencyRuleUpdateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        changed:
          type: array
          items:
            type: string
