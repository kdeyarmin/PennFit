        - changed
    ConversationReplyRequest:
      type: object
      description: |
        Body for POST /conversations/{id}/reply. The text is sent on
        whichever channel the conversation already uses; admins do
        not pick a channel here. Trimmed and length-bounded server-
        side; SMS-channel replies above 160 chars will be sent as
        multi-part by the carrier.
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 1600
          description: Reply text. Trimmed; must be non-empty after trim.
      required:
        - body
      additionalProperties: false
    ConversationReplyResponse:
      type: object
      description: |
        Echoes the new outbound message id, the conversation id the
        reply was appended to, and the vendor's send reference
        (Twilio MessageSid or SendGrid X-Message-Id). Vendor refs
        let admins cross-reference webhook delivery events later.
      properties:
        messageId:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        vendorRef:
          type: string
          nullable: true
      required:
        - messageId
        - conversationId
        - vendorRef
    ConversationReplyConflict:
      type: object
      description: |
        Returned when the conversation is closed, or the patient
        has no usable contact for this channel (no phone for SMS,
        no email for email, voice channel where text replies are
        not supported).
      properties:
        error:
          type: string
          enum: [conversation_closed, patient_missing_contact]
        channel:
          type: string
          enum: [sms, voice, email]
          nullable: true
          description: Present only on patient_missing_contact.
        message:
          type: string
      required:
        - error
        - message
    ConversationReplyUnsupported:
      type: object
      description: Returned when the patient's phone could not be parsed as E.164.
      properties:
        error:
          type: string
          enum: [patient_phone_unnormalizable]
        message:
          type: string
      required:
        - error
        - message
    ConversationReplyVendorError:
      type: object
      description: |
        Returned when the SMS/email vendor accepted the request but
        rejected the send. The audit log row records vendor + status
        + code; the dashboard can show the operator a hint while the
        message itself is not retried automatically.
      properties:
        error:
          type: string
          enum: [vendor_api_error]
        vendor:
          type: string
          enum: [twilio, sendgrid]
        vendorStatus:
          type: integer
          nullable: true
        vendorCode:
          type: string
          nullable: true
        message:
          type: string
      required:
        - error
        - vendor
        - message
    MessagingUnavailableError:
      type: object
      description: |
        Returned with HTTP 503 when one or more of the messaging-
        subsystem env vars are missing. Lists the required vars in
        the message so the deployer knows what to set.
      properties:
        error:
          type: string
          enum: [messaging_not_configured, vendor_config_error]
        message:
          type: string
      required:
        - error
        - message
    PatientNote:
      type: object
      description: |
        A single admin case-note. Body is decrypted server-side
        before serialization; the wire format is plaintext but
        the column is encrypted at rest.
      properties:
        id:
          type: string
          format: uuid
        body:
          type: string
        authorEmail:
          type: string
        authorUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - body
        - authorEmail
        - createdAt
    PatientNotesPage:
      type: object
      description: |
        The list response is wrapped (rather than a bare array) so we
        can add filters / pagination later without a breaking change.
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PatientNote"
        count:
          type: integer
          minimum: 0
          description: Length of items[] (max 50, newest first).
      required:
        - items
        - count
    CreatePatientNoteRequest:
      type: object
      description: |
        Body for POST /patients/{id}/notes. Free-text; the column is
        encrypted at the SQL site via pgcrypto so the body never lands
        in plaintext on disk or in the audit metadata.
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 4000
      required:
        - body
      additionalProperties: false
    CreatePrescriptionRequest:
      type: object
      description: |
        Body for POST /patients/{id}/prescriptions. The optional
        `details` fields (prescriberName, prescriberNpi, diagnosis,
        notes) are stitched into the encrypted `details` JSON column;
        encrypt happens server-side.
      properties:
        itemSku:
          type: string
          minLength: 1
          maxLength: 64
        cadenceDays:
          type: integer
          minimum: 1
          maximum: 365
        validFrom:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        validUntil:
          type: string
          nullable: true
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        prescriberName:
          type: string
          nullable: true
          maxLength: 160
        prescriberNpi:
          type: string
          nullable: true
          maxLength: 20
        diagnosis:
          type: string
          nullable: true
          maxLength: 2000
        notes:
          type: string
          nullable: true
          maxLength: 2000
      required:
        - itemSku
        - cadenceDays
        - validFrom
      additionalProperties: false
    CreatePrescriptionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
        - id
    UpdatePrescriptionStatusRequest:
      type: object
      description: |
        Body for PATCH /prescriptions/{rxId}. Only the lifecycle
        status is mutable — clinical fields are immutable on
        purpose to keep provenance honest.
      properties:
        status:
          type: string
          enum: [active, expired, revoked]
      required:
        - status
      additionalProperties: false
    UpdatePrescriptionStatusResponse:
      type: object
      description: |
        Echoes the prescription id and the resulting status.
        `changed` is false when the requested status equals the
        current one (no-op idempotency for double-clicks).
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, expired, revoked]
        changed:
          type: boolean
      required:
        - id
        - status
        - changed
    ImportPatientRow:
      type: object
      description: |
        One CSV row, post-parse. Must satisfy the same per-field
        rules as POST /patients (E.164 phone, ISO date of birth,
        all-or-none address). Address line2 / country are optional
        even when the rest of the address is provided.
      properties:
        pacwareId:
          type: string
          minLength: 1
          maxLength: 64
        legalFirstName:
          type: string
          minLength: 1
          maxLength: 80
        legalLastName:
          type: string
          minLength: 1
          maxLength: 80
        dateOfBirth:
          type: string
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        phoneE164:
          type: string
          pattern: "^\\+[1-9]\\d{7,14}$"
        email:
          type: string
          format: email
          maxLength: 254
        addressLine1:
          type: string
          maxLength: 160
        addressLine2:
          type: string
          maxLength: 160
        city:
          type: string
          maxLength: 80
        state:
          type: string
          maxLength: 40
        postalCode:
          type: string
          maxLength: 20
        country:
          type: string
          maxLength: 40
        insurancePayer:
          type: string
          maxLength: 120
      required:
        - pacwareId
        - legalFirstName
        - legalLastName
        - dateOfBirth
      additionalProperties: false
    ImportPatientsCsvRequest:
      type: object
      description: |
        Wrapped row array. Server caps batch size at 500 to keep
        the request well under the body-parser timeout; the
        dashboard chunks larger imports into multiple requests.
      properties:
        rows:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/ImportPatientRow"
      required:
        - rows
      additionalProperties: false
    ImportPatientRowError:
      type: object
      properties:
        rowIndex:
          type: integer
          minimum: 0
        field:
          type: string
        message:
          type: string
      required:
        - rowIndex
        - message
    ImportPatientsCsvResponse:
      type: object
      description: |
        Per-call import result. `errors[]` lets the dashboard render
        a downloadable error CSV; `createdIds[]` is empty for
        skipped/error rows so the dashboard can compute "I
        successfully created N patients in this batch".
      properties:
        created:
          type: integer
          minimum: 0
        skippedDuplicates:
          type: integer
          minimum: 0
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ImportPatientRowError"
        createdIds:
          type: array
          items:
            type: string
            format: uuid
      required:
        - created
        - skippedDuplicates
        - errors
        - createdIds
