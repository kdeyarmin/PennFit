    AuditListItem:
      type: object
      description: |
        One audit row. `metadata` is the plaintext jsonb context written
        through @workspace/resupply-audit's sanitiser (PHI-key denylist
        + size + depth caps), so it is safe to surface as-is. The
        dashboard renderer additionally allowlists keys it knows how to
        display.
      properties:
        id:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        operatorEmail:
          type: string
          nullable: true
        operatorClerkId:
          type: string
          nullable: true
        action:
          type: string
        targetTable:
          type: string
          nullable: true
        targetId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
      required:
        - id
        - occurredAt
        - action
        - metadata
    AuditPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditListItem"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - items
        - total
        - limit
        - offset
