        patientId:
          type: string
          format: uuid
        patientFirstName:
          type: string
        patientLastName:
          type: string
        prescriptionId:
          type: string
          format: uuid
        itemSku:
          type: string
        cadenceDays:
          type: integer
        status:
          type: string
          enum: [outreach_pending, awaiting_response, confirmed, declined, expired, fulfilled, canceled]
        dueAt:
          type: string
          format: date-time
        daysOverdue:
