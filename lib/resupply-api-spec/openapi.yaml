        createdAt:
          type: string
          format: date-time
      required:
        - id
        - patientId
        - patientFirstName
        - patientLastName
        - prescriptionId
        - itemSku
        - cadenceDays
        - status
        - dueAt
        - daysOverdue
        - createdAt
    EpisodeListPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EpisodeListItem"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - items
        - total
        - limit
        - offset
    EpisodeCounts:
      type: object
      description: |
        Per-status episode counts surfaced as chips on the Episodes
        page. `overdue` is a synthetic bucket (outreach_pending +
        awaiting_response with dueAt in the past) and is NOT a sum
        of any of the other fields. `all` is the unfiltered total
        ignoring status.
      properties:
        overdue:
          type: integer
          minimum: 0
        outreach_pending:
          type: integer
          minimum: 0
        awaiting_response:
          type: integer
          minimum: 0
        confirmed:
          type: integer
          minimum: 0
        declined:
          type: integer
          minimum: 0
        expired:
          type: integer
          minimum: 0
        fulfilled:
          type: integer
          minimum: 0
        canceled:
          type: integer
          minimum: 0
        all:
          type: integer
          minimum: 0
      required:
        - overdue
        - outreach_pending
        - awaiting_response
        - confirmed
        - declined
        - expired
        - fulfilled
        - canceled
        - all
    EpisodesBulkSendRequest:
      type: object
      description: |
        Bulk-send request. `episodeIds` is the list of episodes to
        message (1..50). `channel` selects the dispatch fan-out:
        either every reminder goes by SMS or every reminder goes by
        email. We do NOT support per-id channel selection because
        dispatchers asking for "send the queue" expect uniform
        channel behaviour.
      properties:
        episodeIds:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uuid
        channel:
          type: string
          enum:
            - sms
            - email
      required:
        - episodeIds
        - channel
      additionalProperties: false
    EpisodesBulkSendItemResult:
      type: object
      description: |
        Per-id outcome from a bulk send. `status="ok"` carries the new
        conversationId + vendor reference. Any other status is a
        skip/failure with a stable `error` code mirroring the single-
        send endpoint's MessagingError vocabulary.
      properties:
        episodeId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - ok
            - error
        conversationId:
          type: string
          format: uuid
          nullable: true
        vendorRef:
          type: string
          nullable: true
          description: |
            Twilio MessageSid (sms) or SendGrid X-Message-Id (email)
            for cross-referencing in vendor logs.
        error:
          type: string
          nullable: true
          description: |
            Stable error code mirroring MessagingError.error when
            status is "error".
        message:
          type: string
          nullable: true
          description: Human-readable detail for the dashboard. Never PHI.
      required:
        - episodeId
        - status
    EpisodesBulkSendResponse:
      type: object
      description: |
        Bulk-send response. `summary` is the aggregate counters; each
        item in `results` is keyed by its episodeId so the dashboard
        can patch row state without a list re-fetch.
      properties:
        summary:
          type: object
          properties:
            total:
              type: integer
              minimum: 0
            sent:
              type: integer
              minimum: 0
            failed:
              type: integer
              minimum: 0
          required:
            - total
            - sent
            - failed
        results:
          type: array
          items:
            $ref: "#/components/schemas/EpisodesBulkSendItemResult"
      required:
        - summary
        - results
    AuditListItem:
      type: object
      description: |
        One audit row. `metadata` is the plaintext jsonb context written
        through @workspace/resupply-audit's sanitiser (PHI-key denylist
        + size + depth caps), so it is safe to surface as-is. The
        dashboard renderer additionally allowlists keys it knows how to
        display.
      properties:
        id:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        adminEmail:
          type: string
          nullable: true
        adminUserId:
          type: string
          nullable: true
        action:
          type: string
        targetTable:
          type: string
          nullable: true
        targetId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
      required:
        - id
        - occurredAt
        - action
        - metadata
    AuditPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditListItem"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 100
        offset:
          type: integer
          minimum: 0
      required:
        - items
        - total
        - limit
        - offset
    PatientUpdate:
      type: object
      description: |
        Body for PATCH /patients/{id}. All fields are independently
        optional; sending `null` explicitly clears the field, omitting
        it leaves the column unchanged. PHI columns (name, phone,
        email) are NOT writable via this endpoint.

        `expectedUpdatedAt` is an OPTIONAL optimistic-concurrency
        precondition. When supplied, the server gates the UPDATE on
        `updated_at = $expected`; if the row moved underneath the
        client a 409 `stale_patient` is returned so the dashboard
        can refetch and prompt the admin to re-confirm. Omit the
        field to disable the check (admin-override semantics for
        bulk tooling).
      properties:
        insurancePayer:
          type: string
          nullable: true
          maxLength: 120
        cadenceOverrideDays:
          type: integer
          nullable: true
          minimum: 1
          maximum: 365
        channelPreference:
          type: string
          nullable: true
          enum: [sms, email, voice]
        status:
          type: string
          enum: [active, paused, closed]
          description: |
            Lifecycle status. `paused` removes the patient from the
            outreach scan; `closed` is terminal (off program). The
            scan suppresses paused/closed patients regardless of
            episode state, so this is the canonical pause/resume
            knob.
        expectedUpdatedAt:
          type: string
          format: date-time
          description: |
            ISO-8601 timestamp of the patient row the client last
            saw. Echo back the `updatedAt` field returned by
            GET /patients/{id} or a prior PATCH response.
      additionalProperties: false
    PatientUpdateResponse:
      type: object
      description: |
        Echoes the patient id, the list of column names changed,
        and the row's new `updatedAt` so callers can keep their
        optimistic-concurrency token current.
      properties:
        id:
          type: string
          format: uuid
        changed:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - changed
        - updatedAt
    StalePatientError:
      type: object
      description: |
        Returned by PATCH /patients/{id} when an `expectedUpdatedAt`
        precondition was supplied and did not match the live row.
        The dashboard should refetch the patient and prompt the
        admin to re-apply their edit.
      properties:
        error:
          type: string
          enum: [stale_patient]
        message:
          type: string
      required:
        - error
        - message
    BulkPatientStatusRequest:
      type: object
      description: |
        Body for POST /patients/bulk-status. `ids` accepts up to 100
        patient uuids; duplicates are silently deduped. `status` is
        applied to every matched row; ids that don't match are
        returned in `failed[]`. Bulk action does NOT honor
        per-patient optimistic-concurrency — admins use this when
        they want a definitive override.
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 100
        status:
          type: string
          enum: [active, paused, closed]
      required:
        - ids
        - status
      additionalProperties: false
    BulkPatientStatusResponse:
      type: object
      description: |
        Outcome of POST /patients/bulk-status. `updated[]` is the rows
        that succeeded (with their post-update `updatedAt` token);
        `failed[]` is the rows that didn't match. The dashboard
        renders both counts in the success toast.
      properties:
        updated:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              status:
                type: string
                enum: [active, paused, closed]
              updatedAt:
                type: string
                format: date-time
            required:
              - id
              - status
              - updatedAt
        failed:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              error:
                type: string
                enum: [not_found]
            required:
              - id
              - error
      required:
        - updated
        - failed
    PatientTimelineEvent:
      type: object
      description: |
        One row in the patient timeline. `kind` is the event type;
        `at` is an ISO-8601 timestamp; `episodeId` /
        `conversationId` / `prescriptionId` / `fulfillmentId` are
        optional cross-references the dashboard uses for deep-linking.
      properties:
        kind:
          type: string
          enum:
            - patient_created
            - prescription_created
            - episode_created
            - message
            - fulfillment_queued
            - fulfillment_submitted
            - fulfillment_shipped
            - fulfillment_delivered
        at:
          type: string
          format: date-time
        title:
          type: string
        detail:
          type: string
          nullable: true
        episodeId:
          type: string
          format: uuid
          nullable: true
        conversationId:
          type: string
          format: uuid
          nullable: true
        prescriptionId:
          type: string
          format: uuid
          nullable: true
        fulfillmentId:
          type: string
          format: uuid
          nullable: true
      required:
        - kind
        - at
        - title
        - detail
        - episodeId
        - conversationId
        - prescriptionId
        - fulfillmentId
    PatientTimeline:
      type: object
      properties:
        patientId:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: "#/components/schemas/PatientTimelineEvent"
      required:
        - patientId
        - events
    FrequencyRule:
      type: object
      description: |
        A frequency rule consulted by the eligibility engine when a
        patient has no per-patient override. NULL `match_*` predicates
        mean "this rule does not constrain on that axis".
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        priority:
          type: integer
          minimum: 0
          description: Lower priority is evaluated first.
        matchItemSkuPrefix:
          type: string
          nullable: true
        matchInsurancePayer:
          type: string
          nullable: true
        minTenureDays:
          type: integer
          nullable: true
          minimum: 0
        maxTenureDays:
          type: integer
          nullable: true
          minimum: 0
        cadenceDays:
          type: integer
          minimum: 1
          maximum: 365
        defaultChannel:
          type: string
          nullable: true
          enum: [sms, email, voice]
        active:
          type: boolean
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - priority
        - matchItemSkuPrefix
        - matchInsurancePayer
        - minTenureDays
        - maxTenureDays
        - cadenceDays
        - defaultChannel
        - active
        - notes
        - createdAt
        - updatedAt
    FrequencyRuleList:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: "#/components/schemas/FrequencyRule"
      required:
        - rules
    FrequencyRuleCreate:
      type: object
