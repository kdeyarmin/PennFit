openapi: 3.1.0
info:
  # Do not change the title — orval uses it to name generated output files.
  title: Api
  version: 0.1.0
  description: |
    CPAP Resupply Automation operator API. Powers the operator dashboard
    (queue, episode detail, conversation viewer, fulfillment). Patient
    PHI flows through this API and lives in the resupply.* schema.
servers:
  - url: /resupply-api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: |
        Liveness probe. Does NOT touch the database. The deploy gate uses
        this to decide whether the container is up. A separate /readyz
        endpoint will cover dependency readiness once those dependencies
        exist.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [resupply-api]
      required:
        - status
        - service
