          type: string
          enum: [open, awaiting_patient, awaiting_admin, closed]
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ConversationMessage"
      required:
        - id
        - patientId
        - patientFirstName
        - patientLastName
        - episodeId
        - channel
        - status
        - createdAt
        - messages
    EpisodeListItem:
      type: object
      properties:
        id:
