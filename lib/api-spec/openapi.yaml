openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CPAP Mask Fitting API - stateless recommendation service. No PHI stored.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: recommend
    description: Mask recommendation operations
  - name: orders
    description: Mask order submission
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    post:
      operationId: submitOrder
      tags: [orders]
      summary: Submit a mask order to Penn Home Medical Supply
      description: |
        Accepts patient contact, shipping address, insurance information, and
        the chosen mask. Forwards the order to Penn Home Medical Supply via
        secure email. Stateless — order details are NOT stored on the server,
        NOT logged, and discarded after the email is sent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "200":
          description: Order submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Invalid order payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream email provider failed to deliver the order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Email delivery not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommend:
    post:
      operationId: getRecommendation
      tags: [recommend]
      summary: Get mask recommendation
      description: |
        Accepts facial measurements (numeric only) and questionnaire answers.
        Returns ranked mask recommendations. No images accepted. No PHI stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
      responses:
        "200":
          description: Recommendation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masks:
    get:
      operationId: listMasks
      tags: [recommend]
      summary: List mask catalog
      description: Returns full catalog of available CPAP masks with fit ranges
      responses:
        "200":
          description: Mask catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaskCatalogResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FacialMeasurements:
      type: object
      description: Numeric measurements in millimeters derived from on-device face mesh. No image data.
      properties:
        noseWidth:
          type: number
          description: Width of nose at bridge in mm
        noseHeight:
          type: number
          description: Height of nose from bridge to tip in mm
        noseToChin:
          type: number
          description: Distance from nose tip to chin in mm
        mouthWidth:
          type: number
          description: Width of mouth at corners in mm
        faceWidthAtCheekbones:
          type: number
          description: Width of face at cheekbone level in mm
        calibrationMethod:
          type: string
          enum: [creditCard, iris, manual]
          description: Method used to calibrate mm/pixel conversion
      required:
        - noseWidth
        - noseHeight
        - noseToChin
        - mouthWidth
        - faceWidthAtCheekbones
        - calibrationMethod

    QuestionnaireAnswers:
      type: object
      description: Clinical questionnaire answers affecting mask type suitability
      properties:
        mouthBreather:
          type: boolean
        claustrophobic:
          type: boolean
        sideOrStomachSleeper:
          type: boolean
        heavyFacialHair:
          type: boolean
        wearsGlasses:
          type: boolean
        frequentCongestion:
          type: boolean
        priorMaskExperience:
          type: string
          enum: [none, nasal, nasalPillow, fullFace, hybrid]
        mobilityLimitations:
          type: boolean
        sensitiveSkin:
          type: boolean
        siliconeSensitivity:
          type: boolean
      required:
        - mouthBreather
        - claustrophobic
        - sideOrStomachSleeper
        - heavyFacialHair
        - wearsGlasses
        - frequentCongestion
        - priorMaskExperience
        - mobilityLimitations
        - sensitiveSkin
        - siliconeSensitivity

    RecommendationRequest:
      type: object
      properties:
        measurements:
          $ref: "#/components/schemas/FacialMeasurements"
        answers:
          $ref: "#/components/schemas/QuestionnaireAnswers"
      required:
        - measurements
        - answers

    MaskRecommendation:
      type: object
      properties:
        maskId:
          type: string
        name:
          type: string
        modelNumber:
          type: string
          description: Penn Home Medical Supply SKU / model number for ordering
        manufacturer:
          type: string
        type:
          type: string
          enum: [fullFace, nasal, nasalPillow, hybrid]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        summary:
          type: string
          description: One-sentence personalized explanation of why this mask fits the patient and their needs
        reasoning:
          type: array
          items:
            type: string
        features:
          type: array
          items:
            type: string
        contraindications:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - maskId
        - name
        - modelNumber
        - manufacturer
        - type
        - confidence
        - summary
        - reasoning
        - features
        - contraindications

    RecommendationResponse:
      type: object
      properties:
        topRecommendations:
          type: array
          items:
            $ref: "#/components/schemas/MaskRecommendation"
          maxItems: 3
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/MaskRecommendation"
        disclaimer:
          type: string
      required:
        - topRecommendations
        - alternatives
        - disclaimer

    MaskEntry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        modelNumber:
          type: string
          description: Penn Home Medical Supply SKU / model number for ordering
        manufacturer:
          type: string
        type:
          type: string
          enum: [fullFace, nasal, nasalPillow, hybrid]
        description:
          type: string
          description: Marketing-style description of the mask
        fitRanges:
          type: object
          properties:
            noseWidthMin:
              type: number
            noseWidthMax:
              type: number
            noseToChinMin:
              type: number
            noseToChinMax:
              type: number
            mouthWidthMin:
              type: number
            mouthWidthMax:
              type: number
          required:
            - noseWidthMin
            - noseWidthMax
            - noseToChinMin
            - noseToChinMax
            - mouthWidthMin
            - mouthWidthMax
        features:
          type: array
          items:
            type: string
        contraindications:
          type: array
          items:
            type: string
        cushionMaterial:
          type: string
          description: e.g. Silicone, Memory Foam, Gel
        headgearStyle:
          type: string
          description: e.g. Standard straps, Soft fabric, Magnetic clips
        hoseConnection:
          type: string
          enum: [front, top]
          description: Where the hose attaches
        weightGrams:
          type: number
          description: Total mask weight in grams
        sizesAvailable:
          type: array
          items:
            type: string
          description: Available cushion/pillow sizes
        pressureRangeMin:
          type: number
          description: Minimum recommended CPAP pressure (cmH2O)
        pressureRangeMax:
          type: number
          description: Maximum recommended CPAP pressure (cmH2O)
        priceTier:
          type: string
          enum: [budget, standard, premium]
          description: General price tier for budgeting
        bestFor:
          type: array
          items:
            type: string
          description: Patient profiles this mask works best for
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name
        - modelNumber
        - manufacturer
        - type
        - description
        - fitRanges
        - features
        - contraindications
        - cushionMaterial
        - headgearStyle
        - hoseConnection
        - weightGrams
        - sizesAvailable
        - pressureRangeMin
        - pressureRangeMax
        - priceTier
        - bestFor

    MaskCatalogResponse:
      type: object
      properties:
        masks:
          type: array
          items:
            $ref: "#/components/schemas/MaskEntry"
        total:
          type: integer
      required:
        - masks
        - total

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string
          nullable: true
      required:
        - error

    OrderRequest:
      type: object
      description: |
        Patient and insurance information for a CPAP mask order.
        Forwarded to Penn Home Medical Supply via email and immediately discarded.
      properties:
        chosenMask:
          type: object
          properties:
            maskId:
              type: string
            name:
              type: string
            modelNumber:
              type: string
            manufacturer:
              type: string
          required: [maskId, name, modelNumber, manufacturer]
        patient:
          type: object
          properties:
            firstName:
              type: string
              minLength: 1
              maxLength: 100
            lastName:
              type: string
              minLength: 1
              maxLength: 100
            dateOfBirth:
              type: string
              description: YYYY-MM-DD
              pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            email:
              type: string
              format: email
              maxLength: 200
            phone:
              type: string
              minLength: 7
              maxLength: 30
          required: [firstName, lastName, dateOfBirth, email, phone]
        shippingAddress:
          type: object
          properties:
            street1:
              type: string
              minLength: 1
              maxLength: 200
            street2:
              type: string
              maxLength: 200
            city:
              type: string
              minLength: 1
              maxLength: 100
            state:
              type: string
              minLength: 2
              maxLength: 2
              description: Two-letter US state code
            zip:
              type: string
              minLength: 5
              maxLength: 10
              pattern: "^\\d{5}(-\\d{4})?$"
          required: [street1, city, state, zip]
        insurance:
          type: object
          properties:
            provider:
              type: string
              minLength: 1
              maxLength: 100
              description: e.g. "Aetna", "Blue Cross Blue Shield", "Medicare"
            memberId:
              type: string
              minLength: 1
              maxLength: 50
            groupNumber:
              type: string
              maxLength: 50
            planName:
              type: string
              maxLength: 100
            policyholderName:
              type: string
              maxLength: 200
              description: Leave blank if patient is the policyholder
            policyholderRelationship:
              type: string
              enum: [self, spouse, parent, child, other]
          required: [provider, memberId]
        prescription:
          type: object
          properties:
            hasExistingPrescription:
              type: boolean
              description: Whether the patient already has a CPAP prescription on file
            physicianName:
              type: string
              maxLength: 200
            physicianPhone:
              type: string
              maxLength: 30
          required: [hasExistingPrescription]
        notes:
          type: string
          maxLength: 1000
          description: Optional notes from the patient (allergies, special requests, etc.)
        consentToContact:
          type: boolean
          description: Patient consents to be contacted by Penn Home Medical Supply about this order
      required:
        - chosenMask
        - patient
        - shippingAddress
        - insurance
        - prescription
        - consentToContact

    OrderResponse:
      type: object
      properties:
        success:
          type: boolean
        orderReference:
          type: string
          description: Short reference number the patient can use when calling Penn
        deliveredAt:
          type: string
          description: ISO-8601 timestamp string of when the order was delivered
        message:
          type: string
      required:
        - success
        - orderReference
        - deliveredAt
        - message
