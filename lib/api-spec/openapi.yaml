openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CPAP Mask Fitting API - stateless recommendation service. No PHI stored.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: recommend
    description: Mask recommendation operations
  - name: orders
    description: Mask order submission
  - name: reminders
    description: Supply replacement reminder subscriptions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    post:
      operationId: submitOrder
      tags: [orders]
      summary: Submit a mask order to Penn Home Medical Supply
      description: |
        Accepts patient contact, shipping address, insurance information, and
        the chosen mask. Forwards the order to Penn Home Medical Supply via
        secure email. Stateless — order details are NOT stored on the server,
        NOT logged, and discarded after the email is sent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        "200":
          description: Order submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Invalid order payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream email provider failed to deliver the order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Email delivery not configured on this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reminders:
    post:
      operationId: subscribeToReminders
      tags: [reminders]
      summary: Subscribe to supply replacement reminders
      description: |
        Public endpoint. Behavior depends on whether the email is already
        on file:

        - **New email:** the subscription is created. The response includes
          `manageToken` so the client can deep-link to the manage page
          immediately (this also makes the dev-mode flow usable when
          email delivery isn't configured). A confirmation email is sent
          containing the same manage link.
        - **Existing email:** the response is `alreadySubscribed: true`
          with NO `manageToken` — to prevent email-enumeration takeover
          of an existing subscription, the manage link is only sent to
          the registered owner's inbox. The submitter's items are not
          applied to the existing row; the registered owner can update
          items via the manage page.

        Honeypot: a hidden `website` field. If non-empty, the request is
        silently accepted (fake `manageToken: "honeypot"`) and no DB
        write or email send occurs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeReminderRequest"
      responses:
        "200":
          description: Subscription created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeReminderResponse"
        "400":
          description: Invalid subscription payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reminders/manage:
    get:
      operationId: getReminderSubscription
      tags: [reminders]
      summary: Get a subscription by manage token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderSubscriptionView"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateReminderSubscription
      tags: [reminders]
      summary: Update items on a subscription
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReminderRequest"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderSubscriptionView"
        "400":
          description: Invalid update payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reminders/manage/unsubscribe:
    post:
      operationId: unsubscribeFromReminders
      tags: [reminders]
      summary: Unsubscribe from all reminders
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnsubscribeResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recommend:
    post:
      operationId: getRecommendation
      tags: [recommend]
      summary: Get mask recommendation
      description: |
        Accepts facial measurements (numeric only) and questionnaire answers.
        Returns ranked mask recommendations. No images accepted. No PHI stored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationRequest"
      responses:
        "200":
          description: Recommendation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /masks:
    get:
      operationId: listMasks
      tags: [recommend]
      summary: List mask catalog
      description: Returns full catalog of available CPAP masks with fit ranges
      responses:
        "200":
          description: Mask catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaskCatalogResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FacialMeasurements:
      type: object
      description: Numeric measurements in millimeters derived from on-device face mesh. No image data.
      properties:
        noseWidth:
          type: number
          description: Width of nose at bridge in mm
        noseHeight:
          type: number
          description: Height of nose from bridge to tip in mm
        noseToChin:
          type: number
          description: Distance from nose tip to chin in mm
        mouthWidth:
          type: number
          description: Width of mouth at corners in mm
        faceWidthAtCheekbones:
          type: number
          description: Width of face at cheekbone level in mm
        calibrationMethod:
          type: string
          enum: [creditCard, iris, manual]
          description: Method used to calibrate mm/pixel conversion
      required:
        - noseWidth
        - noseHeight
        - noseToChin
        - mouthWidth
        - faceWidthAtCheekbones
        - calibrationMethod

    QuestionnaireAnswers:
      type: object
      description: Clinical questionnaire answers affecting mask type suitability
      properties:
        mouthBreather:
          type: boolean
        claustrophobic:
          type: boolean
        sideOrStomachSleeper:
          type: boolean
        heavyFacialHair:
          type: boolean
        wearsGlasses:
          type: boolean
        frequentCongestion:
          type: boolean
        priorMaskExperience:
          type: string
          enum: [none, nasal, nasalPillow, fullFace, hybrid]
        mobilityLimitations:
          type: boolean
        sensitiveSkin:
          type: boolean
        siliconeSensitivity:
          type: boolean
        cpapPressureSetting:
          type: string
          enum: [unknown, low, medium, high]
          description: >-
            Patient's prescribed CPAP pressure (cmH2O).
            low = 4–9, medium = 10–14, high = 15+. unknown if patient hasn't been titrated yet.
            High pressures favor full-face/hybrid masks because most nasal pillows aren't rated above ~20 cmH2O.
      required:
        - mouthBreather
        - claustrophobic
        - sideOrStomachSleeper
        - heavyFacialHair
        - wearsGlasses
        - frequentCongestion
        - priorMaskExperience
        - mobilityLimitations
        - sensitiveSkin
        - siliconeSensitivity
        - cpapPressureSetting

    RecommendationRequest:
      type: object
      properties:
        measurements:
          $ref: "#/components/schemas/FacialMeasurements"
        answers:
          $ref: "#/components/schemas/QuestionnaireAnswers"
      required:
        - measurements
        - answers

    MaskRecommendation:
      type: object
      properties:
        maskId:
          type: string
        name:
          type: string
        modelNumber:
          type: string
          description: Penn Home Medical Supply SKU / model number for ordering
        manufacturer:
          type: string
        type:
          type: string
          enum: [fullFace, nasal, nasalPillow, hybrid]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        summary:
          type: string
          description: One-sentence personalized explanation of why this mask fits the patient and their needs
        reasoning:
          type: array
          items:
            type: string
        features:
          type: array
          items:
            type: string
        contraindications:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - maskId
        - name
        - modelNumber
        - manufacturer
        - type
        - confidence
        - summary
        - reasoning
        - features
        - contraindications

    RecommendationResponse:
      type: object
      properties:
        topRecommendations:
          type: array
          items:
            $ref: "#/components/schemas/MaskRecommendation"
          maxItems: 3
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/MaskRecommendation"
        disclaimer:
          type: string
      required:
        - topRecommendations
        - alternatives
        - disclaimer

    MaskEntry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        modelNumber:
          type: string
          description: Penn Home Medical Supply SKU / model number for ordering
        manufacturer:
          type: string
        type:
          type: string
          enum: [fullFace, nasal, nasalPillow, hybrid]
        description:
          type: string
          description: Marketing-style description of the mask
        fitRanges:
          type: object
          properties:
            noseWidthMin:
              type: number
            noseWidthMax:
              type: number
            noseToChinMin:
              type: number
            noseToChinMax:
              type: number
            mouthWidthMin:
              type: number
            mouthWidthMax:
              type: number
          required:
            - noseWidthMin
            - noseWidthMax
            - noseToChinMin
            - noseToChinMax
            - mouthWidthMin
            - mouthWidthMax
        features:
          type: array
          items:
            type: string
        contraindications:
          type: array
          items:
            type: string
        cushionMaterial:
          type: string
          description: e.g. Silicone, Memory Foam, Gel
        headgearStyle:
          type: string
          description: e.g. Standard straps, Soft fabric, Magnetic clips
        hoseConnection:
          type: string
          enum: [front, top]
          description: Where the hose attaches
        weightGrams:
          type: number
          description: Total mask weight in grams
        sizesAvailable:
          type: array
          items:
            type: string
          description: Available cushion/pillow sizes
        pressureRangeMin:
          type: number
          description: Minimum recommended CPAP pressure (cmH2O)
        pressureRangeMax:
          type: number
          description: Maximum recommended CPAP pressure (cmH2O)
        priceTier:
          type: string
          enum: [budget, standard, premium]
          description: General price tier for budgeting
        bestFor:
          type: array
          items:
            type: string
          description: Patient profiles this mask works best for
        imageUrl:
          type: string
          nullable: true
      required:
        - id
        - name
        - modelNumber
        - manufacturer
        - type
        - description
        - fitRanges
        - features
        - contraindications
        - cushionMaterial
        - headgearStyle
        - hoseConnection
        - weightGrams
        - sizesAvailable
        - pressureRangeMin
        - pressureRangeMax
        - priceTier
        - bestFor

    MaskCatalogResponse:
      type: object
      properties:
        masks:
          type: array
          items:
            $ref: "#/components/schemas/MaskEntry"
        total:
          type: integer
      required:
        - masks
        - total

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            type: string
          nullable: true
      required:
        - error

    OrderRequest:
      type: object
      description: |
        Patient and insurance information for a CPAP mask order.
        Forwarded to Penn Home Medical Supply via email and immediately discarded.
      properties:
        chosenMask:
          type: object
          properties:
            maskId:
              type: string
            name:
              type: string
            modelNumber:
              type: string
            manufacturer:
              type: string
          required: [maskId, name, modelNumber, manufacturer]
        patient:
          type: object
          properties:
            firstName:
              type: string
              minLength: 1
              maxLength: 100
            lastName:
              type: string
              minLength: 1
              maxLength: 100
            dateOfBirth:
              type: string
              description: YYYY-MM-DD
              pattern: "^\\d{4}-\\d{2}-\\d{2}$"
            email:
              type: string
              format: email
              maxLength: 200
            phone:
              type: string
              minLength: 7
              maxLength: 30
          required: [firstName, lastName, dateOfBirth, email, phone]
        shippingAddress:
          type: object
          properties:
            street1:
              type: string
              minLength: 1
              maxLength: 200
            street2:
              type: string
              maxLength: 200
            city:
              type: string
              minLength: 1
              maxLength: 100
            state:
              type: string
              minLength: 2
              maxLength: 2
              description: Two-letter US state code
            zip:
              type: string
              minLength: 5
              maxLength: 10
              pattern: "^\\d{5}(-\\d{4})?$"
          required: [street1, city, state, zip]
        insurance:
          type: object
          properties:
            provider:
              type: string
              minLength: 1
              maxLength: 100
              description: e.g. "Aetna", "Blue Cross Blue Shield", "Medicare"
            memberId:
              type: string
              minLength: 1
              maxLength: 50
            groupNumber:
              type: string
              maxLength: 50
            planName:
              type: string
              maxLength: 100
            policyholderName:
              type: string
              maxLength: 200
              description: Leave blank if patient is the policyholder
            policyholderRelationship:
              type: string
              enum: [self, spouse, parent, child, other]
          required: [provider, memberId]
        prescription:
          type: object
          properties:
            hasExistingPrescription:
              type: boolean
              description: Whether the patient already has a CPAP prescription on file
            physicianName:
              type: string
              maxLength: 200
            physicianPhone:
              type: string
              maxLength: 30
          required: [hasExistingPrescription]
        notes:
          type: string
          maxLength: 1000
          description: Optional notes from the patient (allergies, special requests, etc.)
        measurements:
          $ref: "#/components/schemas/FacialMeasurements"
          description: >-
            Optional facial measurements (mm) captured on-device during the
            Penn Fit flow. Forwarded to Penn so fulfillment can verify size
            selection. Numeric only — never includes images.
        consentToContact:
          type: boolean
          description: Patient consents to be contacted by Penn Home Medical Supply about this order
      required:
        - chosenMask
        - patient
        - shippingAddress
        - insurance
        - prescription
        - consentToContact

    ReminderItem:
      type: object
      description: |
        One supply line on a subscription. `sku` is the canonical SKU
        (one of: maskCushion, maskFrameHeadgear, headgear, tubing,
        disposableFilter, reusableFilter, waterChamber). `intervalDays`
        is how often we should remind. `lastReplacedAt` is the date the
        customer last swapped this item in (used to compute next due).
      properties:
        sku:
          type: string
          enum:
            - maskCushion
            - maskFrameHeadgear
            - headgear
            - tubing
            - disposableFilter
            - reusableFilter
            - waterChamber
        lastReplacedAt:
          type: string
          description: YYYY-MM-DD
          pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        intervalDays:
          type: integer
          minimum: 1
          maximum: 365
      required:
        - sku
        - lastReplacedAt
        - intervalDays

    ReminderItemView:
      allOf:
        - $ref: "#/components/schemas/ReminderItem"
        - type: object
          properties:
            nextDueAt:
              type: string
              description: YYYY-MM-DD computed by the server
              pattern: "^\\d{4}-\\d{2}-\\d{2}$"
          required:
            - nextDueAt

    SubscribeReminderRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 200
        items:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: "#/components/schemas/ReminderItem"
        # Honeypot — must be empty. Bots tend to fill every field; humans
        # never see this one (rendered with sr-only + tabindex=-1).
        website:
          type: string
          maxLength: 200
          description: Anti-spam honeypot. Must be empty.
      required:
        - email
        - items

    SubscribeReminderResponse:
      type: object
      properties:
        success:
          type: boolean
        manageToken:
          type: string
          description: |
            Capability token for the /reminders/manage endpoints. ONLY
            returned for newly-created subscriptions. For requests against
            an already-existing email we deliberately omit this field — the
            existing manage link is sent only to the registered owner's
            inbox, so an attacker who guesses an email cannot escalate to
            full subscription control via this endpoint.
        alreadySubscribed:
          type: boolean
          description: |
            True when the email was already on file. The response is
            otherwise indistinguishable from a fresh subscribe (no items
            disclosed, no token disclosed) — the caller should display a
            generic "check your email for a manage link" message.
        emailStatus:
          type: string
          enum: [sent, skipped, failed]
          description: Whether a confirmation / manage email was sent
        message:
          type: string
      required:
        - success
        - emailStatus
        - message

    ReminderSubscriptionView:
      type: object
      properties:
        email:
          type: string
        status:
          type: string
          enum: [active, unsubscribed]
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReminderItemView"
        createdAt:
          type: string
          description: ISO-8601 timestamp
      required:
        - email
        - status
        - items
        - createdAt

    UpdateReminderRequest:
      type: object
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: "#/components/schemas/ReminderItem"
      required:
        - items

    UnsubscribeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    OrderResponse:
      type: object
      properties:
        success:
          type: boolean
        orderReference:
          type: string
          description: Short reference number the patient can use when calling Penn
        deliveredAt:
          type: string
          description: ISO-8601 timestamp string of when the order was delivered
        message:
          type: string
      required:
        - success
        - orderReference
        - deliveredAt
        - message
