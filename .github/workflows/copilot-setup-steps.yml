name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Shared toolchain bootstrap (pnpm install via npm — NOT corepack —
      # then setup-node + frozen-lockfile install). The "why not corepack"
      # rationale that used to live inline here is documented in full on
      # the composite action. The pnpm version pin (11.5.2) is the action's
      # default and matches packageManager / engines.pnpm in root
      # package.json; installing an older pnpm trips
      # ERR_PNPM_UNSUPPORTED_ENGINE.
      - name: Setup pnpm + Node
        uses: ./.github/actions/setup

      - name: Pre-download MediaPipe assets
        # The cpap-fitter `predev`/`prebuild` hooks run scripts/setup-mediapipe.mjs,
        # which fetches face_landmarker.task from storage.googleapis.com. The
        # Copilot agent's firewall blocks that host once the agent starts, so we
        # download it here (before the firewall is enabled) and cache it under
        # public/mediapipe/models/. The setup script skips the download on
        # subsequent runs when the cached file is present.
        working-directory: ${{ github.workspace }}
        run: node artifacts/cpap-fitter/scripts/setup-mediapipe.mjs
