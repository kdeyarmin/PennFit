name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight CI run for a given branch when a new commit lands.
# Saves runner minutes on rapid push sequences and avoids a stale "passing"
# check from a previous head sticking around.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The pnpm version pinned in root package.json. Mirror it explicitly so
  # the workflow runner uses the same interpreter the lockfile was
  # produced with.
  PNPM_VERSION: "11.4.0"
  NODE_VERSION: "24"

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Install pnpm via npm rather than corepack — corepack's pnpm shim
      # fails with ERR_PNPM_NO_PKG_MANIFEST when the runner cwd doesn't
      # contain a package.json (see copilot-setup-steps.yml for the long
      # version of this rationale). Disabling the corepack shim first
      # ensures the npm-installed binary wins the PATH lookup.
      - name: Install pnpm
        run: |
          corepack disable pnpm 2>/dev/null || true
          npm install -g pnpm@${{ env.PNPM_VERSION }}
          pnpm --version

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint:resupply

      - run: pnpm typecheck

  drift:
    name: Schema + codegen + architecture drift
    runs-on: ubuntu-latest
    env:
      # Codegen scripts read DATABASE_URL at import time. A syntactic
      # URL is enough — the drift checks run statically and don't open
      # a real connection.
      DATABASE_URL: postgresql://drift:drift@localhost:5432/drift_check
    steps:
      - uses: actions/checkout@v5

      # Migration prefix-collision guard. The same check runs as a local
      # pre-commit hook, but commits made via the GitHub web UI — or by
      # agents/CI without the hook installed — can still introduce a
      # duplicate NNNN_ migration prefix: two parallel PRs each grab the
      # next free number and only collide once both merge (that is how
      # 0156×4 / 0157×2 landed). Enforcing it here against the PR base
      # closes that gap. PR-only — a push to main has no base to diff.
      - name: Migration prefix collision check
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          BASE_REF=FETCH_HEAD DIFF_TARGET= bash scripts/check-resupply-migration-prefix.sh

      - name: Install pnpm
        run: |
          corepack disable pnpm 2>/dev/null || true
          npm install -g pnpm@${{ env.PNPM_VERSION }}
          pnpm --version

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Architecture drift
        run: scripts/check-resupply-architecture.sh

      # Admin route gate audit — every admin mutation must carry
      # requirePermission / requireAdmin / requireAdminOnly. The
      # script's --self-test exercises the detector logic against a
      # fixture tree of known-good and known-bad routes; the bare
      # invocation scans the real artifacts/resupply-api admin tree
      # and exits non-zero only when a mutation is truly ungated.
      - name: Admin route gate audit
        run: |
          scripts/check-admin-route-gates.sh --self-test
          scripts/check-admin-route-gates.sh

  test:
    name: Tests
    runs-on: ubuntu-latest

    # Most vitest suites mock the DB layer with fluent stubs and do not
    # need a real Postgres. The exception is
    # `lib/resupply-db/scripts/migrate.test.ts`, which shells out to
    # `migrate.mjs` against a live DB and creates throwaway databases
    # to exercise the from-scratch reapply path. Hosting a service
    # container here keeps that test runnable in CI without per-package
    # opt-outs.
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: pennfit
          POSTGRES_PASSWORD: pennfit
          POSTGRES_DB: pennfit_test
        ports:
          - 5432:5432
        # GitHub's runner gates the entire job (no step runs until
        # the service container reports healthy). If healthchecks
        # exhaust before postgres is ready, the job dies in setup
        # with no log of which step failed — we saw this as ~45 s
        # job-failed-without-output runs on bigger PRs on this
        # branch. 20 × 10 s = 200 s gives initdb + first
        # connection plenty of headroom on a contested runner
        # while still failing the job in a reasonable window if
        # the service is genuinely broken.
        options: >-
          --health-cmd "pg_isready -U pennfit -d pennfit_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 20s

    env:
      DATABASE_URL: postgresql://pennfit:pennfit@localhost:5432/pennfit_test
      # PostgREST sits in front of the same Postgres instance and
      # serves the resupply / resupply_auth schemas under /rest/v1 so
      # `@supabase/supabase-js` can talk to it unmodified. The two
      # integration suites that exercise the live PostgREST filter
      # chain — `lib/resupply-audit/src/index.integration.test.ts`
      # and `artifacts/resupply-api/src/worker/jobs/
      # invite-password-expiry-notify.integration.test.ts` — skip
      # silently when SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY is
      # missing, so wiring those vars + a real PostgREST is what
      # actually flips them from SKIPPED to RUN in this job.
      SUPABASE_URL: http://127.0.0.1:3001
      # JWT secret PostgREST validates the Authorization header
      # against. 64 hex chars (256 bits) — well above PostgREST's
      # 32-char minimum. Test-only; never reused outside CI.
      PGRST_JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        run: |
          corepack disable pnpm 2>/dev/null || true
          npm install -g pnpm@${{ env.PNPM_VERSION }}
          pnpm --version

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Wait for the postgres service container to actually accept
      # TCP connections. The `services.postgres.options` healthcheck
      # above gates the *job* on `pg_isready` returning 0, but in
      # practice we have seen the very first connection from the
      # `lib/resupply-db/scripts/migrate.test.ts` integration test
      # fail with `ECONNREFUSED 127.0.0.1:5432` — most plausibly a
      # narrow window between the healthcheck succeeding and the
      # container's published port becoming reachable from the job's
      # network namespace.
      #
      # The original 30s window started failing periodically on the
      # bigger-PR runs (45s total job runtime = ~10s pnpm-install +
      # 30s wait timeout + cleanup, with the wait expiring before
      # postgres responded). Bumping to 120s with a 2s poll keeps
      # the average case fast (loop exits on the very first
      # iteration) while giving cold-cache + heavier-runner jobs
      # the headroom they need.
      - name: Wait for postgres
        shell: bash
        run: |
          set -x
          ss -tlnp 2>&1 | head -20 || true
          # Use `nc` if available; fall back to bash /dev/tcp. Both
          # exit 0 the moment a TCP connection can be established.
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "postgres up after ${i} polls (~$((i * 2))s)"
              exit 0
            fi
            sleep 2
          done
          echo "postgres did not become reachable on 127.0.0.1:5432 within 120s" >&2
          ss -tlnp 2>&1 | head -20 || true
          docker ps --format 'table {{.Names}}\t{{.Status}}' 2>&1 | head -10 || true
          exit 1

      # Apply resupply migrations BEFORE starting PostgREST so the
      # `resupply` and `resupply_auth` schemas exist when PostgREST
      # scans the DB on boot (PostgREST caches the schema at startup;
      # tables created later require a SIGUSR1 to refresh). This is
      # also what makes the invite-expiry integration test's
      # `migrationsReady` probe pass — it queries
      # `resupply_auth.password_credentials.expiry_reminder_sent_at`,
      # a column added by migration 0143.
      - name: Apply resupply migrations
        run: node lib/resupply-db/scripts/migrate.mjs

      # Start PostgREST on :3001 with `server-base-path=/rest/v1`
      # so `@supabase/supabase-js` (which suffixes `${SUPABASE_URL}/
      # rest/v1` onto every request) talks to it unmodified. The
      # container reaches the postgres service via host.docker.internal
      # (mapped to the runner's host-gateway), which is the published
      # port of the postgres service container.
      #
      # `db-anon-role=pennfit` and `db-schemas=resupply,resupply_auth,
      # public` match the schemas our worker code queries. Service-
      # role JWTs (issued below) carry `role: pennfit` so PostgREST
      # SETs the session role to the real Postgres user that already
      # owns these schemas — no `service_role` DB role needs to be
      # provisioned.
      - name: Start PostgREST
        run: |
          docker run -d --name postgrest \
            --add-host=host.docker.internal:host-gateway \
            -p 127.0.0.1:3001:3000 \
            -e PGRST_DB_URI="postgres://pennfit:pennfit@host.docker.internal:5432/pennfit_test" \
            -e PGRST_DB_SCHEMAS="resupply,resupply_auth,public" \
            -e PGRST_DB_ANON_ROLE="pennfit" \
            -e PGRST_JWT_SECRET="$PGRST_JWT_SECRET" \
            -e PGRST_SERVER_PORT="3000" \
            -e PGRST_SERVER_HOST="*4" \
            -e PGRST_OPENAPI_SERVER_PROXY_URI="http://127.0.0.1:3001/rest/v1" \
            -e PGRST_SERVER_BASE_PATH="/rest/v1" \
            postgrest/postgrest:v12.2.3
          # Wait for PostgREST to actually serve requests. The schema
          # cache load + initial DB connection can take a few seconds
          # on a cold runner; fail fast at 30s if it never comes up.
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3001/rest/v1/" > /dev/null 2>&1; then
              echo "postgrest is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "postgrest did not respond on :3001 within 30s" >&2
          docker logs postgrest 2>&1 | tail -50 || true
          exit 1

      # Mint a service-role JWT signed with PGRST_JWT_SECRET so
      # `@supabase/supabase-js` (which sends it as both `apikey` and
      # `Authorization: Bearer …`) can authenticate against the
      # PostgREST instance above. `role: pennfit` makes PostgREST
      # SET ROLE to the real owner of our schemas. We export
      # SUPABASE_SERVICE_ROLE_KEY via $GITHUB_ENV so subsequent
      # steps (the test runner) see it.
      - name: Mint Supabase service-role JWT
        run: |
          # CommonJS one-liner inside SINGLE-quoted bash so neither
          # `$` (end-of-regex anchor) nor `\` (regex escapes) need
          # any bash-level escaping — the script reaches node
          # byte-for-byte. The secret comes through process.env so
          # it never appears in argv. HS256 signed with
          # PGRST_JWT_SECRET; `role: pennfit` makes PostgREST
          # `SET LOCAL ROLE pennfit` (the schema owner) for the
          # request, so the integration tests' SELECTs go through.
          node -e '
            const crypto = require("node:crypto");
            const fs = require("node:fs");
            const b64u = (b) => Buffer.from(b).toString("base64")
              .replace(/=+$/, "").replace(/\+/g, "-").replace(/\//g, "_");
            const header = b64u(JSON.stringify({ alg: "HS256", typ: "JWT" }));
            const payload = b64u(JSON.stringify({
              role: "pennfit",
              iss: "supabase-ci",
              iat: Math.floor(Date.now()/1000),
              exp: Math.floor(Date.now()/1000) + 60*60*24,
            }));
            const sig = crypto.createHmac("sha256", process.env.PGRST_JWT_SECRET)
              .update(header + "." + payload).digest();
            const jwt = header + "." + payload + "." + b64u(sig);
            fs.appendFileSync(process.env.GITHUB_ENV,
              "SUPABASE_SERVICE_ROLE_KEY=" + jwt + "\n");
            // Sanity log: print only the header (never the signature)
            // so a malformed JWT is obvious from the CI logs.
            console.log("minted JWT header:",
              Buffer.from(header, "base64").toString());
          '

      # Run the test suite. Show vitest output verbosely so a single
      # failing test name is searchable in the CI logs without having
      # to re-trigger with extra flags.
      - name: Diagnostics — env snapshot
        if: always()
        run: |
          set -x
          date
          node --version
          pnpm --version
          free -m
          df -h /home || true
          docker ps -a --format 'table {{.Names}}\t{{.Status}}' 2>&1 | head -10 || true
          ss -tlnp 2>&1 | grep ":5432" || echo "5432 not listening"
          pg_isready -h 127.0.0.1 -p 5432 || echo "pg_isready failed"
          # Mark "now" so the failure-tail step's `find -newer` only
          # surfaces logs/artifacts written during the test step.
          touch /tmp/runtime-marker
      - name: Run tests
        run: pnpm -r --if-present run test
      - name: Diagnostics — failure tail
        if: failure()
        run: |
          set -x
          date
          free -m
          docker ps -a --format 'table {{.Names}}\t{{.Status}}' 2>&1 | head -10 || true
          # Look for crashed worker logs vitest leaves behind.
          find . -maxdepth 4 -name '*.log' -newer /tmp/runtime-marker 2>/dev/null | head -20 || true

  a11y:
    name: A11y (Playwright + axe)
    runs-on: ubuntu-latest

    # Independent from the rest of CI: builds the SPA, serves it via
    # vite preview, and runs e2e/tests/a11y.spec.ts against the major
    # public routes. Fails on `serious` or `critical` axe violations
    # (the lower tiers tend to be cosmetic-but-debatable; tightening
    # the bar after the noisier findings are addressed is a one-line
    # change in e2e/tests/a11y.spec.ts).
    #
    # Marked continue-on-error so the FIRST failing finding doesn't
    # immediately gate every PR — the team needs a window to triage
    # baseline violations on the existing pages before flipping this
    # to required. Mirrors the drift-check pattern (P0.1 in
    # docs/codebase-enhancements-2026-05-08.md).
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        run: |
          corepack disable pnpm 2>/dev/null || true
          npm install -g pnpm@${{ env.PNPM_VERSION }}
          pnpm --version

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Build the SPA. vite preview serves the built artifact on the
      # port we pass in via E2E_PORT; the e2e config defaults to
      # 5173 if E2E_PORT is unset.
      - name: Build cpap-fitter SPA
        run: pnpm --filter @workspace/cpap-fitter run build

      - name: Install Playwright browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      # Serve the built SPA in the background. `vite preview` exits
      # the process when the parent shell exits, so we don't need an
      # explicit shutdown step.
      #
      # vite.config.ts requires PORT + BASE_PATH at config-resolution
      # time (the !isBuild guard fires for `vite preview` since
      # process.argv contains "preview", not "build"). Set both here
      # so the config loads cleanly. PORT must match the --port flag
      # we pass (the config feeds it into preview.port; mismatch
      # causes strictPort failures).
      - name: Start vite preview
        env:
          PORT: "5173"
          BASE_PATH: "/"
        run: |
          pnpm --filter @workspace/cpap-fitter exec \
            vite preview --config vite.config.ts --host 127.0.0.1 --port 5173 &
          # Wait for the port to be ready (vite preview is fast but
          # not instant); fail fast at 30s if it never opens.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null 2>&1; then
              echo "vite preview is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "vite preview did not respond on :5173 within 30s"
          exit 1

      - name: Run a11y tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          CI: "true"
        run: pnpm exec playwright test --config e2e/playwright.config.ts e2e/tests/a11y.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 14

  smoke:
    name: Smoke (Playwright)
    runs-on: ubuntu-latest

    # Required check (NOT continue-on-error): a smoke-test failure
    # means the SPA build is broken — anyone visiting the site would
    # see a blank page or a runtime error. The single existing test
    # (e2e/tests/storefront-loads.spec.ts) just confirms the React
    # app mounts and the landing nav renders without console errors.
    # Add more specs here as the team picks up the suite.
    #
    # Job structure mirrors the a11y job above; the duplication is
    # intentional so each signal reports independently. If future
    # work bundles them, factor the shared setup into a composite
    # action.
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        run: |
          corepack disable pnpm 2>/dev/null || true
          npm install -g pnpm@${{ env.PNPM_VERSION }}
          pnpm --version

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build cpap-fitter SPA
        run: pnpm --filter @workspace/cpap-fitter run build

      - name: Install Playwright browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      # vite.config.ts requires PORT + BASE_PATH at config-resolution
      # time (the !isBuild guard fires for `vite preview` because
      # process.argv contains "preview", not "build"). Setting them
      # here mirrors the a11y job above.
      - name: Start vite preview
        env:
          PORT: "5173"
          BASE_PATH: "/"
        run: |
          pnpm --filter @workspace/cpap-fitter exec \
            vite preview --config vite.config.ts --host 127.0.0.1 --port 5173 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null 2>&1; then
              echo "vite preview is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "vite preview did not respond on :5173 within 30s"
          exit 1

      - name: Run smoke test
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          CI: "true"
        run: pnpm exec playwright test --config e2e/playwright.config.ts e2e/tests/storefront-loads.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 14
