name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight CI run for a given branch when a new commit lands.
# Saves runner minutes on rapid push sequences and avoids a stale "passing"
# check from a previous head sticking around.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The pnpm version pinned in root package.json. Mirror it explicitly so
  # the workflow runner uses the same interpreter the lockfile was
  # produced with.
  PNPM_VERSION: "11.5.2"
  NODE_VERSION: "24"

jobs:
  lint-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - run: pnpm lint:resupply

      # Prettier is the formatter of record (.prettierignore scopes it),
      # but nothing gated it — style drift slipped into PRs and polluted
      # diffs. `format:check` is non-destructive (it only reports), so a
      # failure here means "run `pnpm format` and recommit."
      - run: pnpm format:check

      - run: pnpm typecheck

  drift:
    name: Schema + codegen + architecture drift
    runs-on: ubuntu-latest
    env:
      # Codegen scripts read DATABASE_URL at import time. A syntactic
      # URL is enough — the drift checks run statically and don't open
      # a real connection.
      DATABASE_URL: postgresql://drift:drift@localhost:5432/drift_check
    steps:
      - uses: actions/checkout@v5

      # Migration prefix-collision guard. The same check runs as a local
      # pre-commit hook, but commits made via the GitHub web UI — or by
      # agents/CI without the hook installed — can still introduce a
      # duplicate NNNN_ migration prefix: two parallel PRs each grab the
      # next free number and only collide once both merge (that is how
      # 0156×4 / 0157×2 landed). Enforcing it here against the PR base
      # closes that gap. PR-only — a push to main has no base to diff.
      - name: Migration prefix collision check
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          BASE_REF=FETCH_HEAD DIFF_TARGET= bash scripts/check-resupply-migration-prefix.sh

      # Migration immutability guard. Complements the prefix check above:
      # a migration that already exists on the PR base must not be edited
      # or deleted. migrate.mjs dedups applied migrations by content hash,
      # so an in-place edit makes the deploy-time migrator re-apply the
      # file against prod and gates the Railway release if it isn't
      # perfectly idempotent — the 2026-06-05 0212_compliance_rules.sql
      # incident. PR-only — a push to main has no base to diff.
      - name: Migration immutability check
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          BASE_REF=FETCH_HEAD DIFF_TARGET= bash scripts/check-resupply-migration-immutability.sh

      # Block NEW "readFileSync my own source and grep it" tests (they
      # pass on broken logic + break on refactors). Only fires on files
      # ADDED in the PR, so the ~98 legacy offenders don't block anyone;
      # an inline `allow-source-read` comment opts a file out. PR-only —
      # a push to main has no base to diff.
      - name: Source-grep test guard
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          BASE_REF=FETCH_HEAD DIFF_TARGET= bash scripts/check-no-source-grep-tests.sh

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # The architecture checker is a set of ripgrep queries; the
      # ubuntu-latest runner image does not ship `rg`. Without it the
      # checker matched nothing and "passed" vacuously — the gate enforced
      # nothing in CI until this step was added (surfaced by wiring the
      # checker's own self-test into CI; the checker now also hard-fails
      # if rg is absent rather than passing empty).
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Architecture drift
        run: scripts/check-resupply-architecture.sh

      # Admin route gate audit — every admin mutation must carry
      # requirePermission / requireAdmin / requireAdminOnly. The
      # script's --self-test exercises the detector logic against a
      # fixture tree of known-good and known-bad routes; the bare
      # invocation scans the real artifacts/resupply-api admin tree
      # and exits non-zero only when a mutation is truly ungated.
      - name: Admin route gate audit
        run: |
          scripts/check-admin-route-gates.sh --self-test
          scripts/check-admin-route-gates.sh

      # Fixture-driven negative-test harnesses for the guard scripts:
      # each `--self-test` execs the sibling `*.sh.test`, which builds a
      # synthetic tree, plants known violations, and asserts the checker
      # catches them (then that a clean tree passes). The admin-gate
      # harness already runs via its `--self-test` in the step above; the
      # architecture + migration-prefix harnesses shipped with their
      # checkers but ran in NO pipeline until now — see
      # docs/workflow-efficiency-audit-2026-06-04.md (W5/W5a). They guard
      # the repo's primary architecture invariant, so an undetected
      # regression in the checker itself is exactly what they prevent.
      - name: Architecture checker self-test
        run: scripts/check-resupply-architecture.sh --self-test

      - name: Migration-prefix checker self-test
        run: scripts/check-resupply-migration-prefix.sh --self-test

      - name: Migration-immutability checker self-test
        run: scripts/check-resupply-migration-immutability.sh --self-test

      - name: Source-grep test guard self-test
        run: bash scripts/check-no-source-grep-tests.sh --self-test

      # Self-test for the pre-commit staged-snapshot library (the helper
      # that makes the hook's checks see the staged index, not the live
      # working tree). No `--self-test` wrapper — it's a hook lib, not a
      # checker — so invoke the harness directly. Was dormant; its
      # scenario 9 also had a self-inflicted bug (an in-repo stderr sink
      # the lib correctly swept), fixed in the same change that wired it
      # in. See docs/workflow-efficiency-audit-2026-06-04.md (W5).
      - name: Staged-snapshot library self-test
        run: bash scripts/git-hooks/lib-staged-snapshot.test

  test:
    name: Tests
    runs-on: ubuntu-latest

    # The vitest suites mock the DB layer with fluent stubs, so the bulk
    # of the tests need no real Postgres and run here. The DB-backed
    # suites self-skip when their env is absent:
    #   * lib/resupply-db/scripts/migrate.test.ts  -> describe.skipIf(!DATABASE_URL)
    #   * lib/resupply-db/scripts/migration-pr-changes.test.ts -> same
    #   * .../invite-password-expiry-notify.integration.test.ts
    #       -> skips unless DATABASE_URL + SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY
    # DATABASE_URL is intentionally NOT set here, so those skip cleanly.
    #
    # The migration-replay suites now run for real in the dedicated
    # `migrations` job below (Postgres service container). The earlier
    # claim that the from-scratch replay was "broken (~17 ordering/role
    # failures)" turned out to be stale: the only gap was that the
    # GRANT/REVOKE migrations (0169+) target the Supabase-provided roles
    # anon/authenticated/service_role, which exist on managed Supabase
    # but not on a vanilla Postgres — create those three roles first and
    # the full 0000..latest chain applies cleanly. The PostgREST-backed
    # invite-password-expiry-notify suite still needs a full Supabase
    # stack (PostgREST + GoTrue), not just a Postgres container, so it
    # remains skipped pending a local-Supabase harness.

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run tests
        run: pnpm -r --if-present run test
      - name: Diagnostics — failure tail
        if: failure()
        run: |
          set -x
          date
          free -m
          docker ps -a --format 'table {{.Names}}\t{{.Status}}' 2>&1 | head -10 || true
          # Look for crashed worker logs vitest leaves behind.
          find . -maxdepth 4 -name '*.log' -newer /tmp/runtime-marker 2>/dev/null | head -20 || true

  migrations:
    name: Migration replay (Postgres)
    runs-on: ubuntu-latest

    # Runs the DB-backed migration suites against a real Postgres:
    #   * migrate.test.ts            — full 0000..latest from-scratch
    #                                  replay + idempotence on re-run
    #   * migration-pr-changes.test.ts — post-migration schema assertions
    # Both gate on DATABASE_URL (skipIf), so they run here and skip in the
    # unit-only `test` job above. This is the harness that was previously
    # removed; it works once the Supabase platform roles exist (see the
    # "Create Supabase platform roles" step).

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resupply_ci
        ports:
          - 5432:5432
        # Wait until Postgres accepts connections before the steps run.
        options: >-
          --health-cmd "pg_isready -U postgres -d resupply_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resupply_ci

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Supabase provisions anon/authenticated/service_role as managed
      # platform roles; the resupply migrations GRANT/REVOKE against them
      # (0169+). A vanilla Postgres service container has none, so create
      # the three before any replay. (migrate.test.ts also creates them
      # idempotently in beforeAll, but the explicit migrate step below
      # runs outside vitest and needs them first.)
      - name: Create Supabase platform roles
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE anon NOLOGIN;" \
            -c "CREATE ROLE authenticated NOLOGIN;" \
            -c "CREATE ROLE service_role NOLOGIN;"

      # Apply the full migration chain once so migration-pr-changes.test.ts
      # — which assumes an already-migrated DATABASE_URL and does not run
      # the migrator itself — has a schema to inspect. migrate.test.ts
      # re-runs the migrator (idempotent) and spins up its own temp DBs
      # for the from-scratch path.
      - name: Apply migrations (from scratch)
        run: node lib/resupply-db/scripts/migrate.mjs

      - name: Run DB-backed migration tests
        run: pnpm --filter @workspace/resupply-db test

  integration:
    name: Integration (PostgREST)
    runs-on: ubuntu-latest

    # Runs the DB-backed Supabase integration test(s) — currently
    # invite-password-expiry-notify.integration.test.ts — against a REAL
    # PostgREST surface (the service-role data path), not just a Postgres
    # container. We don't spin up the full managed Supabase stack (Kong +
    # GoTrue + Storage): a standalone PostgREST binary plus a tiny
    # /rest/v1 path proxy is enough for what these tests exercise. The
    # bootstrap lives in scripts/ci/start-test-postgrest.sh.
    #
    # continue-on-error while the harness proves itself in CI (mirrors the
    # a11y job). The test itself is validated; the soft gate covers
    # setup flakiness (PostgREST binary download, daemon startup). Flip to
    # required once it has been green across a few runs.
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resupply_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d resupply_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resupply_ci

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Migrations 0169+ GRANT/REVOKE against the Supabase platform roles;
      # create them before the replay (see the migrations job).
      - name: Create Supabase platform roles
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "CREATE ROLE anon NOLOGIN;" \
            -c "CREATE ROLE authenticated NOLOGIN;" \
            -c "CREATE ROLE service_role NOLOGIN;"

      - name: Apply migrations
        run: node lib/resupply-db/scripts/migrate.mjs

      # Grants service_role, downloads PostgREST, starts it + the
      # /rest/v1 proxy (background — they persist across steps), and
      # exports SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY to $GITHUB_ENV.
      - name: Start standalone PostgREST
        run: bash scripts/ci/start-test-postgrest.sh

      - name: Run PostgREST integration tests
        run: |
          pnpm --filter @workspace/resupply-api exec \
            vitest run src/worker/jobs/invite-password-expiry-notify.integration.test.ts

  a11y:
    name: A11y (Playwright + axe)
    runs-on: ubuntu-latest

    # Independent from the rest of CI: builds the SPA, serves it via
    # vite preview, and runs e2e/tests/a11y.spec.ts against the major
    # public routes. Fails on `serious` or `critical` axe violations
    # (the lower tiers tend to be cosmetic-but-debatable; tightening
    # the bar after the noisier findings are addressed is a one-line
    # change in e2e/tests/a11y.spec.ts).
    #
    # Marked continue-on-error so the FIRST failing finding doesn't
    # immediately gate every PR — the team needs a window to triage
    # baseline violations on the existing pages before flipping this
    # to required. Mirrors the drift-check pattern (P0.1 in
    # docs/codebase-enhancements-2026-05-08.md).
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # Build the SPA. vite preview serves the built artifact on the
      # port we pass in via E2E_PORT; the e2e config defaults to
      # 5173 if E2E_PORT is unset.
      - name: Build cpap-fitter SPA
        run: pnpm --filter @workspace/cpap-fitter run build

      # Cache the downloaded browser binary across runs (and between the
      # a11y + smoke jobs in the same run, since they share this cache
      # key). On a hit, `playwright install` below skips the ~100 MB
      # chromium download and only the (fast) OS-dependency apt step runs.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      # Serve the built SPA in the background. `vite preview` exits
      # the process when the parent shell exits, so we don't need an
      # explicit shutdown step.
      #
      # vite.config.ts requires PORT + BASE_PATH at config-resolution
      # time (the !isBuild guard fires for `vite preview` since
      # process.argv contains "preview", not "build"). Set both here
      # so the config loads cleanly. PORT must match the --port flag
      # we pass (the config feeds it into preview.port; mismatch
      # causes strictPort failures).
      - name: Start vite preview
        env:
          PORT: "5173"
          BASE_PATH: "/"
        run: |
          pnpm --filter @workspace/cpap-fitter exec \
            vite preview --config vite.config.ts --host 127.0.0.1 --port 5173 &
          # Wait for the port to be ready (vite preview is fast but
          # not instant); fail fast at 30s if it never opens.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null 2>&1; then
              echo "vite preview is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "vite preview did not respond on :5173 within 30s"
          exit 1

      - name: Run a11y tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          CI: "true"
        run: pnpm exec playwright test --config e2e/playwright.config.ts e2e/tests/a11y.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 14

  smoke:
    name: Smoke (Playwright)
    runs-on: ubuntu-latest

    # Required check (NOT continue-on-error): a smoke-test failure
    # means the SPA build is broken — anyone visiting the site would
    # see a blank page or a runtime error. The single existing test
    # (e2e/tests/storefront-loads.spec.ts) just confirms the React
    # app mounts and the landing nav renders without console errors.
    # Add more specs here as the team picks up the suite.
    #
    # Job structure mirrors the a11y job above; the duplication is
    # intentional so each signal reports independently. If future
    # work bundles them, factor the shared setup into a composite
    # action.
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build cpap-fitter SPA
        run: pnpm --filter @workspace/cpap-fitter run build

      # Shares the cache key with the a11y job (see its comment); chromium
      # is downloaded at most once per CI run and reused across runs while
      # pnpm-lock.yaml (hence the Playwright version) is unchanged.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      # vite.config.ts requires PORT + BASE_PATH at config-resolution
      # time (the !isBuild guard fires for `vite preview` because
      # process.argv contains "preview", not "build"). Setting them
      # here mirrors the a11y job above.
      - name: Start vite preview
        env:
          PORT: "5173"
          BASE_PATH: "/"
        run: |
          pnpm --filter @workspace/cpap-fitter exec \
            vite preview --config vite.config.ts --host 127.0.0.1 --port 5173 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null 2>&1; then
              echo "vite preview is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "vite preview did not respond on :5173 within 30s"
          exit 1

      - name: Run smoke test
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          CI: "true"
        run: pnpm exec playwright test --config e2e/playwright.config.ts e2e/tests/storefront-loads.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 14

  e2e-dev:
    name: E2E (Playwright, dev server)
    runs-on: ubuntu-latest

    # results-page-resilience.spec.ts is a regression test that REQUIRES
    # the Vite *dev* server: it stubs @mediapipe/tasks-vision by
    # intercepting the ES-module request, which only exists as a separate
    # fetch when modules are served unbundled (dev). Under `vite preview`
    # (what the smoke/a11y jobs use) the module is bundled and the spec
    # self-skips — so it ran in NO CI job until now (see
    # docs/workflow-efficiency-audit-2026-06-04.md, W4). This job boots
    # the dev server so the spec runs for real.
    #
    # continue-on-error while the harness proves itself in CI — this spec
    # has never run here, and a full mocked-camera fitter walk is the
    # most timing-sensitive thing in the suite. Mirrors the soft-gate
    # pattern of the integration + a11y jobs; flip to required once it's
    # been green across a few runs.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # The dev server's predev hook downloads the MediaPipe model from
      # storage.googleapis.com; run it as an explicit, debuggable step so
      # a download failure is distinct from a server-start failure.
      - name: Pre-download MediaPipe assets
        run: node artifacts/cpap-fitter/scripts/setup-mediapipe.mjs

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      # `vite dev` (not preview) so modules are served unbundled and the
      # spec's @mediapipe/tasks-vision module stub can take effect. The
      # dev script already passes --host 0.0.0.0; vite reads PORT +
      # BASE_PATH from env (strictPort: true).
      - name: Start vite dev server
        env:
          PORT: "5173"
          BASE_PATH: "/"
        run: |
          pnpm --filter @workspace/cpap-fitter dev &
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5173/ > /dev/null 2>&1; then
              echo "vite dev is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "vite dev did not respond on :5173 within 60s"
          exit 1

      - name: Run results-page resilience spec
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          CI: "true"
        run: pnpm exec playwright test --config e2e/playwright.config.ts e2e/tests/results-page-resilience.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-dev-report
          path: playwright-report/
          retention-days: 14

  railway-build:
    name: Railway prod build (Node 24)
    runs-on: ubuntu-latest

    # Builds the production deploy artifacts the way Railway does — which
    # NOTHING else in CI exercises: the other jobs only typecheck/test or
    # build the SPA, never the resupply-api esbuild bundle. Runs the exact
    # railway.json buildCommand on Node 24 with NODE_ENV=production, so a
    # broken production build can't stay green in CI again. See
    # docs/railway-hosting-review-2026-05-29.md R6.
    #
    # NODE_ENV=production is set to mirror Railway. (Note: pnpm — unlike npm
    # — does NOT drop devDependencies for NODE_ENV, so the build toolchain is
    # present; that is verified by the install + build below.)
    env:
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install: "false"
          # The explicit "Install (frozen)" step below populates the pnpm
          # store, so the store cache is safe here (unlike the audit job,
          # which never installs and must leave the cache off — see the
          # `cache` input in .github/actions/setup/action.yml).
          cache: "true"

      - name: Toolchain + env
        run: node -v && pnpm -v && echo "NODE_ENV=$NODE_ENV"

      # Mirror Railpack's install (plain frozen install — includes dev deps).
      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      # The exact railway.json buildCommand: build the artifacts only,
      # serialized to keep peak memory low, and (deliberately) WITHOUT the
      # redundant typecheck — esbuild/vite bundle the libs from src, and CI's
      # lint-typecheck job already gates types. Keep this in sync with
      # railway.json's build.buildCommand.
      - name: Railway buildCommand
        run: pnpm -r --workspace-concurrency=1 --if-present run build && node scripts/embed-spa.mjs

      - name: Confirm the deploy artifacts were produced
        run: |
          test -f artifacts/resupply-api/dist/index.mjs && echo "resupply-api dist/index.mjs OK"
          test -f artifacts/cpap-fitter/dist/public/index.html && echo "cpap-fitter SPA OK"
          test -f artifacts/resupply-api/dist/public/index.html && echo "embedded SPA (resupply-api/dist/public) OK"

  audit:
    name: Dependency audit (high)
    runs-on: ubuntu-latest

    # Surfaces known high-severity transitive CVEs in the dependency
    # tree. This is a PHI-adjacent app, so a vulnerable transitive dep
    # is worth knowing about. Started soft-gated during the initial
    # advisory triage; promoted to BLOCKING 2026-06-09 with the tree
    # clean (`pnpm audit --audit-level=high` → no known vulnerabilities).
    # If a fresh unpatchable advisory ever blocks an unrelated PR, prefer
    # a scoped `pnpm.auditConfig.ignoreCves` entry in package.json (with
    # a comment linking the advisory) over flipping this back to soft.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          install: "false"

      - name: pnpm audit (high+)
        run: pnpm audit --audit-level=high
